      const [alert, setAlert] = useState({ show: false, type: '', message: '' });
      const [activeMenu, setActiveMenu] = useState(() => {
        return localStorage.getItem('activeMenu') || 'dashboard';
      });
      
      // Save activeMenu to localStorage when it changes
      useEffect(() => {
        localStorage.setItem('activeMenu', activeMenu);
      }, [activeMenu]);
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [savingQuote, setSavingQuote] = useState(false);
      const isAdmin = userRole === 'admin';

      // Quote form state
      const [quoteNumber, setQuoteNumber] = useState('');
      const [date, setDate] = useState(new Date().toISOString().slice(0, 16));
      const [validUntil, setValidUntil] = useState('');
      const [customerId, setCustomerId] = useState('');
      const [customerName, setCustomerName] = useState('');
      const [customerCompany, setCustomerCompany] = useState('');
      const [customerAddress, setCustomerAddress] = useState('');
      const [customerCity, setCustomerCity] = useState('');
      const [customerPhone, setCustomerPhone] = useState('');
      const [customerEmail, setCustomerEmail] = useState('');
      const [preparedBy, setPreparedBy] = useState(currentUser);
      const [objective, setObjective] = useState(''); // NEW
      const [lineItems, setLineItems] = useState([
        { itemNumber: 1, modelNumber: '', itemName: '', category: '', qty: 1, lockedField: '' } // NEW structure
      ]);
      const [materialCost, setMaterialCost] = useState(0); // NEW
      const [installationCost, setInstallationCost] = useState(0); // NEW
      const [salesTax, setSalesTax] = useState(0); // NEW
      const [downPayment, setDownPayment] = useState(0); // NEW

      useEffect(() => {
        loadItems(); // Changed from loadStocks
        loadCustomers();
        generateQuoteNumber();
        setDefaultValidUntil();
      }, []);

      const loadItems = () => {
        google.script.run
          .withSuccessHandler((result) => {
            if (result && result.success) {
              setItems(result.inventory || []); // getInventorySummary returns 'inventory' array
            }
          })
          .withFailureHandler((error) => {
            showAlert('danger', 'Failed to load items: ' + error.message);
          })
          .getInventorySummary(); // Changed from getStocks
      };

      const loadCustomers = () => {
        google.script.run
          .withSuccessHandler((result) => {
            if (result && result.success) {
              setCustomers(result.customers);
            }
          })
          .withFailureHandler((error) => {
            showAlert('danger', 'Failed to load customers: ' + error.message);
          })
          .getCustomers();
      };

      const generateQuoteNumber = () => {
        google.script.run
          .withSuccessHandler((number) => {
            setQuoteNumber(number);
          })
          .getNextQuoteNumber();
      };

      const setDefaultValidUntil = () => {
        const date = new Date();
        date.setDate(date.getDate() + 30);
        setValidUntil(date.toISOString().slice(0, 16));
      };

      const showAlert = (type, message) => {
        const Toast = Swal.mixin({
          toast: true,
          position: 'top-end',
          showConfirmButton: false,
          timer: 3000,
          timerProgressBar: true,
          didOpen: (toast) => {
            toast.addEventListener('mouseenter', Swal.stopTimer)
            toast.addEventListener('mouseleave', Swal.resumeTimer)
          }
        });

        const iconType = type === 'success' ? 'success' :
                        type === 'danger' ? 'error' :
                        type === 'warning' ? 'warning' : 'info';

        Toast.fire({
          icon: iconType,
          title: message
        });
      };

      const addLineItem = () => {
        const nextItemNumber = lineItems.length + 1;
        setLineItems([...lineItems, { 
          itemNumber: nextItemNumber,
          modelNumber: '', 
          itemName: '', 
          category: '', 
          qty: 1,
          lockedField: ''
        }]);
      };

      const removeLineItem = (index) => {
        if (lineItems.length > 1) {
          const newItems = lineItems.filter((_, i) => i !== index);
          // Renumber items
          newItems.forEach((item, i) => {
            item.itemNumber = i + 1;
          });
          setLineItems(newItems);
        }
      };

      const updateLineItem = (index, field, value) => {
        const newItems = [...lineItems];
        newItems[index][field] = value;
        setLineItems(newItems);
      };

      const updateItemByModel = (index, modelNumber) => {
        const newItems = [...lineItems];
        newItems[index].modelNumber = modelNumber;
        
        if (!modelNumber || modelNumber === '') {
          newItems[index].itemName = '';
          newItems[index].category = '';
          newItems[index].lockedField = '';
        } else {
          const item = items.find(i => i.modelNumber === modelNumber);
          if (item) {
            newItems[index].itemName = item.itemName;
            newItems[index].category = item.category || item.itemCategory;
            newItems[index].lockedField = 'name';
          }
        }
        
        setLineItems(newItems);
      };

      const updateItemByName = (index, itemName) => {

        newItems[index].itemName = itemName;
        
        if (!itemName || itemName === '') {

                      placeholder="City, ST ZIP"
                      value={customerCity}
                      onChange={(e) => setCustomerCity(e.target.value)}
                    />
                  </div>
                  <div className="col-md-6 mb-2 print-field">
                    <div className="print-field-label">Phone</div>
                    <input
                      type="text"
                      className="form-control form-control-sm print-field-value"
                      placeholder="Phone"
                      value={customerPhone}
                      onChange={(e) => setCustomerPhone(e.target.value)}
                    />
                  </div>
                  <div className="col-md-6 mb-2 print-field">
                    <div className="print-field-label">Email</div>
                    <input
                      type="email"
                      className="form-control form-control-sm print-field-value"
                      placeholder="Email"
                      value={customerEmail}
                      onChange={(e) => setCustomerEmail(e.target.value)}
                    />
                  </div>
                </div>

                {/* OBJECTIVE SECTION - NEW */}
                <div className="section-header">OBJECTIVE</div>
                <div className="mb-4">
                  <textarea
                    className="form-control"
                    rows="4"
                    placeholder="Enter project objective and description..."
                    value={objective}
                    onChange={(e) => setObjective(e.target.value)}
                    style={{fontSize: '14px', lineHeight: '1.6', resize: 'vertical'}}
                  />
                </div>

                {/* Equipment Items */}
                <div className="section-header">Equipment</div>
                <table className="items-table">
                  <thead>
                    <tr>
                      <th style={{width: '2%', textAlign: 'center'}}>Item</th>
                      <th style={{width: '25%'}}>Model Number *</th>
                      <th style={{width: '44%'}}>Item Name *</th>
                      <th style={{width: '14%'}}>Category</th>
                      <th style={{width: '10%'}}>QTY *</th>
                      <th style={{width: '5%'}} className="no-print"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {lineItems.map((item, index) => (
                      <tr key={index}>
                        <td style={{textAlign: 'center', fontWeight: 'bold', verticalAlign: 'middle'}}>
                          {item.itemNumber}
                        </td>
                        <td>
                          <input
                            type="text"
                            list={`modelNumbers-${index}`}
                            className="form-control form-control-sm"
                            value={item.modelNumber}
                            onChange={(e) => updateItemByModel(index, e.target.value)}
                            disabled={item.lockedField === 'model'}
                            placeholder="Type to search..."
                            style={{backgroundColor: item.lockedField === 'model' ? '#f8f9fa' : 'white'}}
                          />
                          <datalist id={`modelNumbers-${index}`}>
                            <option value="">Select...</option>
                            {items.map((availableItem, i) => (
                              <option key={i} value={availableItem.modelNumber}>
                                {availableItem.modelNumber} - {availableItem.itemName}
                              </option>
                            ))}
                          </datalist>
                        </td>
                        <td>
                          <input
                            type="text"
                            list={`itemNames-${index}`}
                            className="form-control form-control-sm"
                            value={item.itemName}
                            onChange={(e) => updateItemByName(index, e.target.value)}
                            disabled={item.lockedField === 'name'}
                            placeholder="Type to search..."
                            style={{backgroundColor: item.lockedField === 'name' ? '#f8f9fa' : 'white'}}
                          />
                          <datalist id={`itemNames-${index}`}>
                            <option value="">Select...</option>
                            {items.map((availableItem, i) => (
                              <option key={i} value={availableItem.itemName}>
                                {availableItem.itemName}
                              </option>
                            ))}
                          </datalist>
                        </td>
                        <td>
                          <input
                            type="text"
                            className="form-control form-control-sm"
                            value={item.category}
                            readOnly
                            style={{backgroundColor: '#f8f9fa'}}
                          />
                        </td>
                        <td>
                          <input
                            type="number"
                            className="form-control form-control-sm"
                            value={item.qty}
                            onChange={(e) => updateLineItem(index, 'qty', e.target.value)}
                            min="1"
                          />
                        </td>
                        <td className="no-print" style={{textAlign: 'center'}}>
                          {lineItems.length > 1 && (
                            <button
                              type="button"
                              className="btn btn-sm btn-danger"
                              onClick={() => removeLineItem(index)}
                            >
                              <i className="bi bi-trash"></i>
                            </button>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <button
                  type="button"
                  className="btn btn-sm btn-primary mt-2"
                  onClick={addLineItem}
                >
                  <i className="bi bi-plus-circle me-1"></i>
                  Add Line Item
                </button>

                {/* Totals Section */}
                <div className="totals-section" style={{marginTop: '2rem', display: 'flex', justifyContent: 'flex-end'}}>
                  <div className="terms-box">
                    <div className="section-header">TERMS AND CONDITIONS</div>
                    <ol className="terms-list">
                     <li>The recommendations and suggestions made in this proposal are based on information gathered from the provided named areas above and communicated written or verbally from the end user.</li>
                      <li>This information is based on the customer’s request.</li>
                      <li>Adams Telecom Systems make the recommendations as described in this proposal.</li>
                      <li>Adams Telecom Systems is not liable for any use or information that is not described and/or disclosed in this proposal.</li>
                    </ol> 
                    <p style={{fontSize: '12px', marginTop: '15px', fontStyle: 'italic'}}>
                      <strong>Customer Acceptance (Sign below):</strong>
                    </p>
                    <div style={{borderBottom: '1px solid #000', width: '70%', marginTop: '30px'}}></div>
                    <p style={{fontSize: '11px', marginTop: '5px'}}>Print Name:</p>
                  </div>

                  <div style={{width: '400px'}}>
                    <div className="row mb-2">
                      <div className="col-6 text-end"><strong>Material Cost:</strong></div>
                      <div className="col-6">
                        <div className="input-group input-group-sm">
                          <span className="input-group-text">$</span>
                          <input
                            type="number"
                            className="form-control"
                            value={materialCost}
                            onChange={(e) => setMaterialCost(e.target.value)}
                            step="0.01"
                            min="0"
                          />
                        </div>
                      </div>
                    </div>

                    <div className="row mb-2">
                      <div className="col-6 text-end"><strong>Installation & Training:</strong></div>
                      <div className="col-6">
                        <div className="input-group input-group-sm">
                          <span className="input-group-text">$</span>
                          <input
                            type="number"
                            className="form-control"
                            value={installationCost}
                            onChange={(e) => setInstallationCost(e.target.value)}
                            step="0.01"
                            min="0"
                          />
                        </div>
                      </div>
                    </div>

                    <hr />

                    <div className="row mb-2">
                      <div className="col-6 text-end"><strong>Sub Total:</strong></div>
                      <div className="col-6">
                        <strong style={{fontSize: '16px'}}>${calculateSubtotal().toFixed(2)}</strong>
                      </div>
                    </div>

                    <div className="row mb-2">
                      <div className="col-6 text-end"><strong>Sales Tax:</strong></div>
                      <div className="col-6">
                        <div className="input-group input-group-sm">
                          <span className="input-group-text">$</span>
                          <input
                            type="number"
                            className="form-control"
                            value={salesTax}
                            onChange={(e) => setSalesTax(e.target.value)}
                            step="0.01"
                            min="0"
                          />
                        </div>
                      </div>
                    </div>

                    <hr style={{borderTop: '2px solid #000'}} />

                    <div className="row mb-3">
                      <div className="col-6 text-end"><strong style={{fontSize: '18px'}}>Grand Total:</strong></div>
                      <div className="col-6">
                        <strong style={{fontSize: '18px', color: '#001f3f'}}>${calculateTotal().toFixed(2)}</strong>
                      </div>
                    </div>

                    {/* Payment Schedule */}
                    <div style={{backgroundColor: '#f8f9fa', padding: '15px', borderRadius: '8px'}}>
                      <h6 style={{fontWeight: 'bold', marginBottom: '10px'}}>PAYMENT SCHEDULE:</h6>
                      
                      <div className="row mb-2">
                        <div className="col-6 text-end"><strong>Down Payment:</strong></div>
                        <div className="col-6">
                          <div className="input-group input-group-sm">
                            <span className="input-group-text">$</span>
                            <input
                              type="number"
                              className="form-control"
                              value={downPayment}
                              onChange={(e) => setDownPayment(e.target.value)}
                              step="0.01"
                              min="0"
                            />
                          </div>
                        </div>
                      </div>

                      <div className="row">
                        <div className="col-6 text-end"><strong>Final Payment:</strong></div>
                        <div className="col-6">
                          <strong style={{fontSize: '16px', color: '#28a745'}}>${calculateFinalPayment().toFixed(2)}</strong>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>


                {/* Footer */}
                <div className="footer-text">
                  <p>If you have any questions about this price quote, please contact</p>
                  <p>Prepared By: William Sawalhah</p>
                  <p>wsawalhah@adamstelecom.com</p>
                  <p style={{fontStyle: 'italic', fontWeight: 'bold', marginTop: '15px'}}>
                    Thank You For Your Business!
                  </p>
                </div>

                {/* Action Buttons */}
                <div className="action-buttons no-print">
                  <button className="btn btn-navy" onClick={handleSaveQuote} disabled={savingQuote}>
                    {savingQuote ? (
                      <>
                        <span className="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                        Saving...
                      </>
                    ) : (
                      <>
                        <i className="bi bi-save me-2"></i>
                        Save Quote
                      </>
                    )}
                  </button>
          {/*        <button className="btn btn-navy" onClick={handlePrint} disabled={savingQuote}>
                    <i className="bi bi-printer me-2"></i>
                    Print Quote
                  </button> */}
                  <button className="btn btn-outline-secondary" onClick={resetForm} disabled={savingQuote}>
                    <i className="bi bi-arrow-counterclockwise me-2"></i>
                    Reset Form
                  </button>
                </div>
              </div>
            </div>
              </>
            )}

            {/* All Quotes View */}
            {activeMenu === 'quotes' && (
              <AllQuotesView />
            )}

            {/* Invoices View */}
            {activeMenu === 'invoices' && (
              <AllInvoicesView />
            )}

            {/* Customers View */}
            {activeMenu === 'customers' && (
              <CustomersView onCustomerChange={loadCustomers} />
            )}

            {/*
             Stock Items View 
            {activeMenu === 'stocks' && (
              <StocksView />
            )} */}

            {/* Purchase Module Routes */}
            {activeMenu === 'suppliers' && (
              <SuppliersView />
            )}
            
            {activeMenu === 'items' && (
              <ItemsView />
            )}

            {activeMenu === 'inventory' && (
              <InventoryView />
            )}
            
            {activeMenu === 'create-purchase' && (
              <PurchaseEntryView />
            )}

            {/* {activeMenu === 'tech-library' && (
              <TechnicalLibraryView currentUser={currentUser} />
            )} */}
            
            {/* User Management View */}
            {activeMenu === 'users' && isAdmin && (
              <UsersView />
            )}

            {/* Dashboard View */}
            {activeMenu === 'dashboard' && (
              <DashboardView />
            )}
          </div>
        </div>
      );
    }
    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- jQuery (required for DataTables) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
  <script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>

  <!-- Select2 JS for Searchable Dropdowns -->
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</body>
</html>

function TechnicalLibraryView({ currentUser }) {
    const [libraries, setLibraries] = useState([]);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState('');
    const [showAddModal, setShowAddModal] = useState(false);
    const [selectedLibrary, setSelectedLibrary] = useState(null);
    const [viewingLibrary, setViewingLibrary] = useState(null); // For read-only view
    const tableRef = useRef(null);
    const [tableInitialized, setTableInitialized] = useState(false);
  
    useEffect(() => {
      loadLibraries();
    }, []);
  
    const loadLibraries = () => {
      setLoading(true);
      setError('');
      setTableInitialized(false);
  
      google.script.run
        .withSuccessHandler((result) => {
          if (result && result.success) {
            setLibraries(result.libraries || []);
            setLoading(false);
          } else {
            setError(result ? result.message : 'Unknown error');
            setLibraries([]);
            setLoading(false);
          }
        })
        .withFailureHandler((err) => {
          setError('Connection error: ' + err.message);
          setLibraries([]);
          setLoading(false);
        })
        .getLibraries();
    };
  
    useEffect(() => {
      if (!loading && !tableInitialized && libraries.length >= 0 && !error) {
        const timer = setTimeout(() => {
          initializeDataTable();
        }, 100);
        return () => clearTimeout(timer);
      }
    }, [loading, tableInitialized, libraries, error]);
  
    const initializeDataTable = () => {
      if (!tableRef.current) return;
      
      if ($.fn.DataTable.isDataTable(tableRef.current)) {
        $(tableRef.current).DataTable().destroy();
      }
  
      $(tableRef.current).empty();
  
      $(tableRef.current).DataTable({
        data: libraries,
        deferRender: true,
        processing: true,
        autoWidth: false,           
        stateSave: false,
        columns: [
          {
            title: 'Library Name',
            data: 'name',
            render: function(data, type, row) {
              return '<a href="#" class="library-link" data-id="' + row.libraryId + '" style="color: #001f3f; font-weight: 600; text-decoration: none;">' + data + '</a>';
            }
          },
          { 
            title: 'Description', 
            data: 'description',
            render: function(data) {
              return data.length > 100 ? data.substring(0, 100) + '...' : data;
            }
          },
          { 
            title: 'Equipment', 
            data: 'equipmentCount',
            render: function(data) {
              return '<span class="badge bg-info">' + data + ' items</span>';
            }
          },
          { 
            title: 'Files', 
            data: 'fileCount',
            render: function(data) {
              return '<span class="badge bg-secondary">' + data + ' files</span>';
            }
          },
          {
            title: 'Created',
            data: 'createdDate',
            render: function(data) {
              if (!data) return 'N/A';
              try {
                return new Date(data).toLocaleDateString();
              } catch(e) {
                return data;
              }
            }
          },
          {
            title: 'Actions',
            data: null,
            orderable: false,
            render: function(data, type, row) {
              return '<button class="btn-action btn-view" onclick="viewLibrary(\'' + row.libraryId + '\')" title="View" style="background: #28a745; color: white;"><i class="bi bi-eye"></i></button>' +
                     '<button class="btn-action btn-edit" onclick="editLibrary(\'' + row.libraryId + '\')" title="Edit"><i class="bi bi-pencil"></i></button>' +
                     '<button class="btn-action btn-delete" onclick="deleteLibrary(\'' + row.libraryId + '\')" title="Delete"><i class="bi bi-trash"></i></button>';
            }
          }
        ],
        destroy: true,
        responsive: true,
        order: [[4, 'desc']],
        pageLength: 10
      });
  
      // Add click handler for library links
      $(tableRef.current).on('click', '.library-link', function(e) {
        e.preventDefault();
        const libraryId = $(this).data('id');
        openLibraryDetails(libraryId);
      });
  
      setTableInitialized(true);
    };
  
    const openLibraryDetails = (libraryId) => {
      setLoading(true);
      google.script.run
        .withSuccessHandler((result) => {
          setLoading(false);
          if (result && result.success) {
            setSelectedLibrary(result.library);
          } else {
            Swal.fire('Error', result ? result.message : 'Failed to load library', 'error');
          }
        })
        .withFailureHandler((err) => {
          setLoading(false);
          Swal.fire('Error', err.message, 'error');
        })
        .getLibraryDetails(libraryId);
    };
  
    window.editLibrary = function(libraryId) {
      openLibraryDetails(libraryId);
    };
    
    window.viewLibrary = function(libraryId) {
      // Open read-only view
      setLoading(true);
      google.script.run
        .withSuccessHandler((result) => {
          setLoading(false);
          if (result && result.success) {
            setViewingLibrary(result.library);
          } else {
            Swal.fire('Error', result ? result.message : 'Failed to load library', 'error');
          }
        })
        .withFailureHandler((err) => {
          setLoading(false);
          Swal.fire('Error', err.message, 'error');
        })
        .getLibraryDetails(libraryId);
    };
  
    window.deleteLibrary = function(libraryId) {
      Swal.fire({
        title: 'Delete Library?',
        text: 'This will delete all diagrams, equipment lists, and steps!',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Yes, delete it!'
      }).then((result) => {
        if (result.isConfirmed) {
          google.script.run
            .withSuccessHandler((result) => {
              if (result && result.success) {
                Swal.fire('Deleted!', result.message, 'success');
                loadLibraries();
              } else {
                Swal.fire('Error', result ? result.message : 'Delete failed', 'error');
              }
            })
            .deleteLibrary(libraryId);
        }
      });
    };
  
    // Show read-only view modal
    if (viewingLibrary) {
      return <LibraryViewOnlyModal library={viewingLibrary} onClose={() => { 
        setViewingLibrary(null); 
        setTableInitialized(false); // Force DataTable re-initialization
      }} />;
    }
  
    if (selectedLibrary) {
      return <LibraryDetailView library={selectedLibrary} onBack={() => { setSelectedLibrary(null); loadLibraries(); }} currentUser={currentUser} />;
    }
  
    if (loading) {
      return (
        <div className="container-fluid">
          <div className="text-center p-5">
            <div className="spinner-border text-primary"></div>
            <p>Loading libraries...</p>
          </div>
        </div>
      );
    }
  
    if (error) {
      return (
        <div className="container-fluid">
          <div className="alert alert-danger">
            <h4>Error Loading Libraries</h4>
            <p>{error}</p>
            <button className="btn btn-primary" onClick={loadLibraries}>Try Again</button>
          </div>
        </div>
      );
    }
  
    return (
      <div className="container-fluid">
        <div className="d-flex justify-content-between align-items-center mb-4">
          <h2><i className="bi bi-book me-2"></i>Technical Library</h2>
          <button className="btn btn-navy" onClick={() => setShowAddModal(true)}>
            <i className="bi bi-plus-circle me-2"></i>Add Library
          </button>
        </div>
  
        {libraries.length === 0 ? (
          <div className="alert alert-info">
            <h5>No libraries found</h5>
            <p>Click "Add Library" to create your first technical reference library.</p>
          </div>
        ) : (
          <div className="card">
            <div className="card-body">
              <table ref={tableRef} className="table table-striped table-hover" style={{width: '100%'}}></table>
            </div>
          </div>
        )}
  
        {showAddModal && <AddLibraryModal onClose={() => setShowAddModal(false)} onSave={loadLibraries} currentUser={currentUser} />}
      </div>
    );
  }
  
  // Add Library Modal
  function AddLibraryModal({ onClose, onSave, currentUser }) {
    const [formData, setFormData] = useState({ name: '', description: '' });
    const [saving, setSaving] = useState(false);
  
    const handleSubmit = () => {
      if (!formData.name.trim()) {
        Swal.fire('Error', 'Please enter a library name', 'warning');
        return;
      }
  
      setSaving(true);
      google.script.run
        .withSuccessHandler((result) => {
          setSaving(false);
          if (result && result.success) {
            Swal.fire('Success', result.message, 'success');
            onClose();
            onSave();
          } else {
            Swal.fire('Error', result ? result.message : 'Failed to create library', 'error');
          }
        })
        .withFailureHandler((err) => {
          setSaving(false);
          Swal.fire('Error', err.message, 'error');
        })
        .createLibrary({ ...formData, createdBy: currentUser });
    };
  
    return (
      <div className="modal show d-block" style={{backgroundColor: 'rgba(0,0,0,0.5)'}}>
        <div className="modal-dialog modal-dialog-centered">
          <div className="modal-content">
            <div className="modal-header">
              <h5 className="modal-title">Add New Library</h5>
              <button type="button" className="btn-close" onClick={onClose}></button>
            </div>
            <div className="modal-body">
              <div className="mb-3">
                <label className="form-label">Library Name *</label>
                <input 
                  type="text" 
                  className="form-control" 
                  value={formData.name}
                  onChange={(e) => setFormData({...formData, name: e.target.value})}
                  placeholder="e.g., Standard 4-Camera IP System"
                />
              </div>
              <div className="mb-3">
                <label className="form-label">Description</label>
                <textarea 
                  className="form-control" 
                  rows="3"
                  value={formData.description}
                  onChange={(e) => setFormData({...formData, description: e.target.value})}
                  placeholder="Brief description of this system..."
                ></textarea>
              </div>
            </div>
            <div className="modal-footer">
              <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
              <button type="button" className="btn btn-navy" onClick={handleSubmit} disabled={saving}>
                {saving ? 'Saving...' : 'Create Library'}
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // Tab 1: Diagrams & Equipment (Read-Only)
  function DiagramsEquipmentTab({ library }) {
    const viewerRef = useRef(null);
    const [selectedFile, setSelectedFile] = useState(null);
    const [zoomLevel, setZoomLevel] = useState(100);
    const [isPanning, setIsPanning] = useState(false);
    const [panPosition, setPanPosition] = useState({ x: 0, y: 0 });
    const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
    const [isFullscreen, setIsFullscreen] = useState(false);
    const [showSidebar, setShowSidebar] = useState(false); // Hamburger menu state
    
    // Initialize with first file
    useEffect(() => {
      if (library.files && library.files.length > 0 && !selectedFile) {
        setSelectedFile(library.files[0]);
      }
    }, [library.files]);
    
    // Keyboard shortcuts
    useEffect(() => {
      const handleKeyDown = (e) => {
        if (!selectedFile) return;
        
        const currentIndex = library.files.findIndex(f => f.fileId === selectedFile.fileId);
        
        if (e.key === 'ArrowLeft' && currentIndex > 0) {
          handleSelectFile(library.files[currentIndex - 1]);
        } else if (e.key === 'ArrowRight' && currentIndex < library.files.length - 1) {
          handleSelectFile(library.files[currentIndex + 1]);
        } else if (e.key === '+' || e.key === '=') {
          handleZoomIn();
        } else if (e.key === '-' || e.key === '_') {
          handleZoomOut();
        } else if (e.key === 'Escape' && isFullscreen) {
          exitFullscreen();
        } else if (e.key === 'f' || e.key === 'F') {
          toggleFullscreen();
        }
      };
      
      window.addEventListener('keydown', handleKeyDown);
      return () => window.removeEventListener('keydown', handleKeyDown);
    }, [selectedFile, library.files, isFullscreen, zoomLevel]);
    
    // Mouse wheel zoom
    useEffect(() => {
      const handleWheel = (e) => {
        if (!viewerRef.current || !selectedFile) return;
        if (viewerRef.current.contains(e.target)) {
          e.preventDefault();
          if (e.deltaY < 0) {
            handleZoomIn();
          } else {
            handleZoomOut();
          }
        }
      };
      
      const viewer = viewerRef.current;
      if (viewer) {
        viewer.addEventListener('wheel', handleWheel, { passive: false });
        return () => viewer.removeEventListener('wheel', handleWheel);
      }
    }, [selectedFile, zoomLevel]);
    
    const handleSelectFile = (file) => {
      setSelectedFile(file);
      setZoomLevel(100);
      setPanPosition({ x: 0, y: 0 });
      setShowSidebar(false); // Hide sidebar after selection
    };
    
    const handleZoomIn = () => {
      setZoomLevel(prev => Math.min(prev + 25, 400));
    };
    
    const handleZoomOut = () => {
      setZoomLevel(prev => Math.max(prev - 25, 25));
    };
    
    const handleZoomReset = () => {
      setZoomLevel(100);
      setPanPosition({ x: 0, y: 0 });
    };
    
    const handleMouseDown = (e) => {
      if (zoomLevel > 100) {
        setIsPanning(true);
        setDragStart({
          x: e.clientX - panPosition.x,
          y: e.clientY - panPosition.y
        });
      }
    };
    
    const handleMouseMove = (e) => {
      if (isPanning) {
        setPanPosition({
          x: e.clientX - dragStart.x,
          y: e.clientY - dragStart.y
        });
      }
    };
    
    const handleMouseUp = () => {
      setIsPanning(false);
    };
    
    const toggleFullscreen = () => {
      if (!isFullscreen) {
        const elem = document.querySelector('.modal-content');
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        }
        setIsFullscreen(true);
      } else {
        exitFullscreen();
      }
    };
    
    const exitFullscreen = () => {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
      setIsFullscreen(false);
    };
    
    const handleDownload = () => {
      if (!selectedFile) return;
      const dataUrl = 'data:' + selectedFile.fileType + ';base64,' + selectedFile.base64Data;
      const link = document.createElement('a');
      link.href = dataUrl;
      link.download = selectedFile.fileName;
      link.click();
    };
    
    const getFileDataUrl = (file) => {
      return 'data:' + file.fileType + ';base64,' + file.base64Data;
    };
    
    return (
      <div>
        {/* DIAGRAMS SECTION */}
        <div style={{marginBottom: '30px'}}>
          <h6 style={{color: '#001f3f', borderBottom: '2px solid #001f3f', paddingBottom: '8px', marginBottom: '15px'}}>
            <i className="bi bi-diagram-3 me-2"></i>
            System Diagrams
          </h6>
          
          {(!library.files || library.files.length === 0) ? (
            <div className="alert alert-info">
              <i className="bi bi-info-circle me-2"></i>
              No diagrams available for this library.
            </div>
          ) : (
            <div style={{border: '2px solid #001f3f', borderRadius: '8px', overflow: 'hidden'}}>
              {/* Header with file name and hamburger menu */}
              <div style={{
                background: '#001f3f',
                color: 'white',
                padding: '12px 15px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between'
              }}>
                <button
                  onClick={() => setShowSidebar(!showSidebar)}
                  style={{
                    background: 'rgba(255,255,255,0.2)',
                    border: 'none',
                    color: 'white',
                    padding: '8px 12px',
                    borderRadius: '6px',
                    cursor: 'pointer',
                    fontSize: '18px',
                    marginRight: '10px'
                  }}
                  title="Toggle diagram list"
                >
                  <i className="bi bi-list"></i>
                </button>
                <span style={{flex: 1, fontWeight: '600'}}>
                  {selectedFile ? selectedFile.fileName : 'Select a diagram'}
                </span>
              </div>
              
              <div style={{position: 'relative'}}>
                {/* Hamburger Sidebar (Slides in from left) */}
                {showSidebar && (
                  <>
                    {/* Overlay */}
                    <div
                      onClick={() => setShowSidebar(false)}
                      style={{
                        position: 'fixed',
                        top: 0,
                        left: 0,
                        right: 0,
                        bottom: 0,
                        background: 'rgba(0,0,0,0.3)',
                        zIndex: 1055
                      }}
                    ></div>
                    
                    {/* Sidebar */}
                    <div style={{
                      position: 'fixed',
                      top: 0,
                      left: 0,
                      bottom: 0,
                      width: '280px',
                      background: 'white',
                      boxShadow: '2px 0 10px rgba(0,0,0,0.3)',
                      zIndex: 1060,
                      overflowY: 'auto',
                      padding: '20px'
                    }}>
                      <div style={{
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'space-between',
                        marginBottom: '20px',
                        paddingBottom: '10px',
                        borderBottom: '2px solid #001f3f'
                      }}>
                        <h6 style={{margin: 0, color: '#001f3f'}}>
                          <i className="bi bi-grid-3x3-gap me-2"></i>
                          Diagrams ({library.files.length})
                        </h6>
                        <button
                          onClick={() => setShowSidebar(false)}
                          style={{
                            background: 'none',
                            border: 'none',
                            fontSize: '24px',
                            cursor: 'pointer',
                            color: '#001f3f'
                          }}
                        >
                          <i className="bi bi-x"></i>
                        </button>
                      </div>
                      
                      {library.files.map((file, idx) => (
                        <div
                          key={file.fileId}
                          onClick={() => handleSelectFile(file)}
                          style={{
                            marginBottom: '12px',
                            padding: '10px',
                            background: selectedFile?.fileId === file.fileId ? '#001f3f' : '#f8f9fa',
                            border: selectedFile?.fileId === file.fileId ? '2px solid #001f3f' : '1px solid #ddd',
                            borderRadius: '8px',
                            cursor: 'pointer',
                            transition: 'all 0.2s'
                          }}
                        >
                          {file.fileType.startsWith('image/') ? (
                            <img
                              src={getFileDataUrl(file)}
                              alt={file.fileName}
                              style={{
                                width: '100%',
                                height: '120px',
                                objectFit: 'contain',
                                marginBottom: '8px',
                                background: selectedFile?.fileId === file.fileId ? 'rgba(255,255,255,0.1)' : 'white',
                                borderRadius: '6px',
                                padding: '5px'
                              }}
                            />
                          ) : (
                            <div style={{
                              width: '100%',
                              height: '120px',
                              display: 'flex',
                              alignItems: 'center',
                              justifyContent: 'center',
                              background: selectedFile?.fileId === file.fileId ? 'rgba(255,255,255,0.1)' : 'white',
                              borderRadius: '6px',
                              marginBottom: '8px'
                            }}>
                              <i className="bi bi-file-pdf" style={{
                                fontSize: '50px',
                                color: selectedFile?.fileId === file.fileId ? 'white' : '#d32f2f'
                              }}></i>
                            </div>
                          )}
                          <div style={{
                            fontSize: '12px',
                            fontWeight: '600',
                            color: selectedFile?.fileId === file.fileId ? 'white' : '#001f3f',
                            wordBreak: 'break-word'
                          }}>
                            {file.fileName}
                          </div>
                        </div>
                      ))}
                    </div>
                  </>
                )}
                
                {/* Viewer Area */}
                <div
                  ref={viewerRef}
                  style={{
                    height: '500px',
                    background: 'linear-gradient(45deg, #f8f9fa 25%, transparent 25%, transparent 75%, #f8f9fa 75%, #f8f9fa), linear-gradient(45deg, #f8f9fa 25%, transparent 25%, transparent 75%, #f8f9fa 75%, #f8f9fa)',
                    backgroundSize: '20px 20px',
                    backgroundPosition: '0 0, 10px 10px',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    overflow: 'hidden',
                    position: 'relative',
                    cursor: zoomLevel > 100 ? (isPanning ? 'grabbing' : 'grab') : 'default'
                  }}
                  onMouseDown={handleMouseDown}
                  onMouseMove={handleMouseMove}
                  onMouseUp={handleMouseUp}
                  onMouseLeave={handleMouseUp}
                >
                  {selectedFile && (
                    selectedFile.fileType.startsWith('image/') ? (
                      <img
                        src={getFileDataUrl(selectedFile)}
                        alt={selectedFile.fileName}
                        style={{
                          maxWidth: zoomLevel > 100 ? 'none' : '100%',
                          maxHeight: zoomLevel > 100 ? 'none' : '100%',
                          width: zoomLevel > 100 ? `${zoomLevel}%` : 'auto',
                          height: 'auto',
                          transform: `translate(${panPosition.x}px, ${panPosition.y}px)`,
                          boxShadow: '0 4px 20px rgba(0,0,0,0.2)',
                          border: '3px solid #001f3f',
                          borderRadius: '4px',
                          userSelect: 'none',
                          pointerEvents: 'none'
                        }}
                        draggable="false"
                      />
                    ) : (
                      <div style={{
                        padding: '40px',
                        background: 'white',
                        borderRadius: '8px',
                        border: '2px solid #001f3f',
                        textAlign: 'center'
                      }}>
                        <i className="bi bi-file-pdf" style={{fontSize: '80px', color: '#d32f2f', marginBottom: '15px'}}></i>
                        <h6 style={{color: '#001f3f'}}>{selectedFile.fileName}</h6>
                        <button
                          className="btn btn-sm btn-navy"
                          onClick={() => window.open(getFileDataUrl(selectedFile), '_blank')}
                        >
                          <i className="bi bi-box-arrow-up-right me-2"></i>Open PDF
                        </button>
                      </div>
                    )
                  )}
                </div>
                
                {/* Control Bar */}
                <div style={{
                  padding: '12px 15px',
                  background: '#f8f9fa',
                  borderTop: '1px solid #dee2e6',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'space-between',
                  flexWrap: 'wrap',
                  gap: '10px'
                }}>
                  {/* Zoom Controls */}
                  <div style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                    <button
                      className="btn btn-sm btn-navy"
                      onClick={handleZoomOut}
                      disabled={zoomLevel <= 25}
                      title="Zoom Out"
                    >
                      <i className="bi bi-dash-lg"></i>
                    </button>
                    <button
                      className="btn btn-sm btn-outline-secondary"
                      onClick={handleZoomReset}
                      style={{minWidth: '70px', fontWeight: 'bold'}}
                      title="Reset Zoom"
                    >
                      {zoomLevel}%
                    </button>
                    <button
                      className="btn btn-sm btn-navy"
                      onClick={handleZoomIn}
                      disabled={zoomLevel >= 400}
                      title="Zoom In"
                    >
                      <i className="bi bi-plus-lg"></i>
                    </button>
                  </div>
                  
                  {/* Action Buttons */}
                  <div style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                    <button
                      className="btn btn-sm btn-outline-secondary"
                      onClick={handleDownload}
                      disabled={!selectedFile}
                      title="Download"
                    >
                      <i className="bi bi-download me-1"></i>Download
                    </button>
                    <button
                      className="btn btn-sm btn-navy"
                      onClick={toggleFullscreen}
                      title={isFullscreen ? "Exit Fullscreen" : "Fullscreen"}
                    >
                      <i className={`bi bi-${isFullscreen ? 'fullscreen-exit' : 'arrows-fullscreen'} me-1`}></i>
                      {isFullscreen ? 'Exit' : 'Fullscreen'}
                    </button>
                  </div>
                  
                  {/* Navigation */}
                  <div style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                    <button
                      className="btn btn-sm btn-outline-secondary"
                      onClick={() => {
                        const currentIndex = library.files.findIndex(f => f.fileId === selectedFile?.fileId);
                        if (currentIndex > 0) handleSelectFile(library.files[currentIndex - 1]);
                      }}
                      disabled={!selectedFile || library.files.findIndex(f => f.fileId === selectedFile?.fileId) === 0}
                      title="Previous"
                    >
                      <i className="bi bi-chevron-left"></i>
                    </button>
                    <span style={{fontSize: '12px', color: '#6c757d', minWidth: '60px', textAlign: 'center'}}>
                      {selectedFile ? library.files.findIndex(f => f.fileId === selectedFile.fileId) + 1 : 0} / {library.files.length}
                    </span>
                    <button
                      className="btn btn-sm btn-outline-secondary"
                      onClick={() => {
                        const currentIndex = library.files.findIndex(f => f.fileId === selectedFile?.fileId);
                        if (currentIndex < library.files.length - 1) handleSelectFile(library.files[currentIndex + 1]);
                      }}
                      disabled={!selectedFile || library.files.findIndex(f => f.fileId === selectedFile?.fileId) === library.files.length - 1}
                      title="Next"
                    >
                      <i className="bi bi-chevron-right"></i>
                    </button>
                  </div>
                </div>
                
                {/* Keyboard Shortcuts Help */}
                <div style={{
                  padding: '8px 15px',
                  background: '#e9ecef',
                  borderTop: '1px solid #dee2e6',
                  fontSize: '11px',
                  color: '#6c757d',
                  display: 'flex',
                  gap: '15px',
                  flexWrap: 'wrap'
                }}>
                  <span><kbd>←</kbd> <kbd>→</kbd> Navigate</span>
                  <span><kbd>+</kbd> <kbd>-</kbd> Zoom</span>
                  <span><kbd>F</kbd> Fullscreen</span>
                  <span><i className="bi bi-mouse-fill"></i> Scroll to zoom</span>
                </div>
              </div>
            </div>
          )}
        </div>
        
        {/* EQUIPMENT SECTION */}
        <div>
          <h6 style={{color: '#001f3f', borderBottom: '2px solid #001f3f', paddingBottom: '8px', marginBottom: '15px'}}>
            <i className="bi bi-tools me-2"></i>
            Equipment List
          </h6>
          
          {(!library.equipment || library.equipment.length === 0) ? (

               onClick={() => setActiveTab('equipment')}

              <i className="bi bi-box-seam me-2"></i>Equipment List
            </a>

  // Diagrams Tab
  // ============================================================================
  // PROFESSIONAL DIAGRAM VIEWER TAB
  // ============================================================================
  // Features:
  // - Sidebar with thumbnail navigation
  // - Professional CAD-style viewer (700px tall)
  // - Zoom: 25% to 400% (keyboard, mouse wheel, buttons)
  // - Pan/drag when zoomed in
  // - Fullscreen mode
  // - Keyboard shortcuts (←/→ navigate, +/- zoom, F fullscreen, ESC exit)
  // - Download, print, navigation controls
  // ============================================================================
  
  function DiagramsTab({ library, onRefresh }) {
    const fileInputRef = useRef(null);
    const viewerRef = useRef(null);
    const containerRef = useRef(null);
    
    // State
    const [selectedFile, setSelectedFile] = useState(null);
    const [zoomLevel, setZoomLevel] = useState(100);
    const [isFullscreen, setIsFullscreen] = useState(false);
    const [isPanning, setIsPanning] = useState(false);
    const [panPosition, setPanPosition] = useState({ x: 0, y: 0 });
    const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
    
    // Initialize with first file
    useEffect(() => {
      if (library.files && library.files.length > 0 && !selectedFile) {
        setSelectedFile(library.files[0]);
      }
    }, [library.files]);
    
    // Keyboard shortcuts
    useEffect(() => {
      const handleKeyDown = (e) => {
        if (!selectedFile) return;
        
        // Arrow keys for navigation
        const currentIndex = library.files.findIndex(f => f.fileId === selectedFile.fileId);
        
        if (e.key === 'ArrowLeft' && currentIndex > 0) {
          handleSelectFile(library.files[currentIndex - 1]);
        } else if (e.key === 'ArrowRight' && currentIndex < library.files.length - 1) {
          handleSelectFile(library.files[currentIndex + 1]);
        } else if (e.key === '+' || e.key === '=') {
          handleZoomIn();
        } else if (e.key === '-' || e.key === '_') {
          handleZoomOut();
        } else if (e.key === 'Escape' && isFullscreen) {
          exitFullscreen();
        } else if (e.key === 'f' || e.key === 'F') {
          toggleFullscreen();
        }
      };
      
      window.addEventListener('keydown', handleKeyDown);
      return () => window.removeEventListener('keydown', handleKeyDown);
    }, [selectedFile, library.files, isFullscreen, zoomLevel]);
    
    // Mouse wheel zoom
    useEffect(() => {
      const handleWheel = (e) => {
        if (!viewerRef.current || !selectedFile) return;
        if (viewerRef.current.contains(e.target)) {
          e.preventDefault();
          if (e.deltaY < 0) {
            handleZoomIn();
          } else {
            handleZoomOut();
          }
        }
      };
      
      const viewer = viewerRef.current;
      if (viewer) {
        viewer.addEventListener('wheel', handleWheel, { passive: false });
        return () => viewer.removeEventListener('wheel', handleWheel);
      }
    }, [selectedFile, zoomLevel]);
    
    // File upload handler
    const handleAddFile = () => {
      fileInputRef.current.click();
    };
    
    const handleFileSelect = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      if (file.size > 2 * 1024 * 1024) {
        Swal.fire('Error', 'File size must be under 2MB', 'error');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(event) {
        const base64 = event.target.result.split(',')[1];
        
        google.script.run
          .withSuccessHandler((result) => {
            if (result && result.success) {
              Swal.fire('Success', 'File uploaded successfully', 'success');
              onRefresh();
            } else {
              Swal.fire('Error', result ? result.message : 'Upload failed', 'error');
            }
          })
          .addLibraryFile({
            libraryId: library.libraryId,
            fileName: file.name,
            fileType: file.type,
            base64Data: base64
          });
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    };
    
    // Delete file handler
    const deleteFile = (fileId, fileName) => {
      Swal.fire({
        title: 'Delete this diagram?',
        text: fileName,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        confirmButtonText: 'Delete',
        cancelButtonColor: '#6c757d'
      }).then((result) => {
        if (result.isConfirmed) {
          google.script.run
            .withSuccessHandler((result) => {
              if (result && result.success) {
                Swal.fire('Deleted!', result.message, 'success');
                setSelectedFile(null);
                onRefresh();
              } else {
                Swal.fire('Error', result ? result.message : 'Delete failed', 'error');
              }
            })
            .deleteLibraryFile(fileId);
        }
      });
    };
    
    // File selection handler
    const handleSelectFile = (file) => {
      setSelectedFile(file);
      setZoomLevel(100);
      setPanPosition({ x: 0, y: 0 });
    };
    
    // Zoom handlers
    const handleZoomIn = () => {
      setZoomLevel(prev => Math.min(prev + 25, 400));
    };
    
    const handleZoomOut = () => {
      setZoomLevel(prev => Math.max(prev - 25, 25));
    };
    
    const handleZoomReset = () => {
      setZoomLevel(100);
      setPanPosition({ x: 0, y: 0 });
    };
    
    const handleZoomFit = () => {
      setZoomLevel(100);
      setPanPosition({ x: 0, y: 0 });
    };
    
    // Pan handlers
    const handleMouseDown = (e) => {
      if (zoomLevel > 100) {
        setIsPanning(true);
        setDragStart({
          x: e.clientX - panPosition.x,
          y: e.clientY - panPosition.y
        });
      }
    };
    
    const handleMouseMove = (e) => {
      if (isPanning) {
        setPanPosition({
          x: e.clientX - dragStart.x,
          y: e.clientY - dragStart.y
        });
      }
    };
    
    const handleMouseUp = () => {
      setIsPanning(false);
    };
    
    // Fullscreen handlers
    const toggleFullscreen = () => {
      if (!isFullscreen) {
        if (containerRef.current.requestFullscreen) {
          containerRef.current.requestFullscreen();
        } else if (containerRef.current.webkitRequestFullscreen) {
          containerRef.current.webkitRequestFullscreen();
        } else if (containerRef.current.msRequestFullscreen) {
          containerRef.current.msRequestFullscreen();
        }
        setIsFullscreen(true);
      } else {
        exitFullscreen();
      }
    };
    
    const exitFullscreen = () => {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      } else if (document.msExitFullscreen) {
        document.msExitFullscreen();
      }
      setIsFullscreen(false);
    };
    
    // Download handler
    const handleDownload = () => {
      if (!selectedFile) return;
      const dataUrl = 'data:' + selectedFile.fileType + ';base64,' + selectedFile.base64Data;
      const link = document.createElement('a');
      link.href = dataUrl;
      link.download = selectedFile.fileName;
      link.click();
    };
    
    // Print handler
    const handlePrint = () => {
      if (!selectedFile) return;
      const dataUrl = 'data:' + selectedFile.fileType + ';base64,' + selectedFile.base64Data;
      const printWindow = window.open('', '_blank');
      printWindow.document.write('<html><head><title>Print Diagram</title></head><body>');
      printWindow.document.write('<img src="' + dataUrl + '" style="max-width:100%; height:auto;" />');
      printWindow.document.write('</body></html>');
      printWindow.document.close();
      printWindow.print();
    };
    
    // Get data URL for current file
    const getFileDataUrl = (file) => {
      return 'data:' + file.fileType + ';base64,' + file.base64Data;
    };
    
    // Empty state
    if (!library.files || library.files.length === 0) {
      return (
        <div className="card">
          <div className="card-body">
            <div className="d-flex justify-content-between align-items-center mb-3">
              <h5><i className="bi bi-diagram-3 me-2"></i>System Diagrams</h5>
              <button className="btn btn-sm btn-navy" onClick={handleAddFile}>
                <i className="bi bi-upload me-2"></i>Upload Diagram
              </button>
              <input 
                ref={fileInputRef} 
                type="file" 
                accept="image/*,application/pdf" 
                style={{display: 'none'}} 
                onChange={handleFileSelect}
              />
            </div>
            <div className="text-center py-5" style={{
              background: 'linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%)',
              border: '2px dashed #001f3f',
              borderRadius: '12px',
              padding: '60px 20px'
            }}>
              <i className="bi bi-diagram-3" style={{fontSize: '64px', color: '#001f3f', opacity: 0.3}}></i>
              <h5 className="mt-3" style={{color: '#001f3f'}}>No Technical Diagrams Yet</h5>
              <p className="text-muted">Upload system diagrams, network layouts, wiring schematics, or CAD drawings</p>
              <button className="btn btn-navy mt-2" onClick={handleAddFile}>
                <i className="bi bi-upload me-2"></i>Upload Your First Diagram
              </button>
            </div>
          </div>
        </div>
      );
    }
    
    // Main viewer UI
    return (
      <div 
        ref={containerRef} 
        className="card" 
        style={{
          height: isFullscreen ? '100vh' : 'auto',
          position: isFullscreen ? 'fixed' : 'relative',
          top: isFullscreen ? 0 : 'auto',
          left: isFullscreen ? 0 : 'auto',
          width: isFullscreen ? '100vw' : 'auto',
          zIndex: isFullscreen ? 9999 : 'auto',
          margin: 0
        }}
      >
        <div className="card-body" style={{ padding: 0 }}>
          {/* Header */}
          <div style={{
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center',
            padding: '15px 20px',
            borderBottom: '2px solid #001f3f',
            background: 'linear-gradient(135deg, #001f3f 0%, #003d7a 100%)',
            color: 'white'
          }}>
            <div>
              <h5 className="mb-0" style={{color: 'white'}}>
                <i className="bi bi-diagram-3 me-2"></i>
                System Diagrams
                {selectedFile && (
                  <span style={{fontSize: '14px', fontWeight: 'normal', marginLeft: '15px', opacity: 0.9}}>
                    <i className="bi bi-file-earmark me-1"></i>
                    {selectedFile.fileName}
                  </span>
                )}
              </h5>
            </div>
            <div style={{display: 'flex', gap: '8px'}}>
              <button className="btn btn-sm btn-light" onClick={handleAddFile} title="Upload Diagram">
                <i className="bi bi-upload me-1"></i>Upload
              </button>
              <input 
                ref={fileInputRef} 
                type="file" 
                accept="image/*,application/pdf" 
                style={{display: 'none'}} 
                onChange={handleFileSelect}
              />
            </div>
          </div>
          
          {/* Main Content Area */}
          <div style={{ display: 'flex', height: isFullscreen ? 'calc(100vh - 70px)' : '700px' }}>
            {/* Sidebar with Thumbnails */}
            <div style={{
              width: '240px',
              borderRight: '2px solid #001f3f',
              overflowY: 'auto',
              background: '#f8f9fa',
              padding: '10px'
            }}>
              <div style={{
                fontSize: '12px',
                fontWeight: 'bold',
                color: '#001f3f',
                marginBottom: '10px',
                padding: '5px 10px',
                background: 'white',
                borderRadius: '6px',
                border: '1px solid #001f3f'
              }}>
                <i className="bi bi-grid-3x3-gap me-2"></i>
                DIAGRAMS ({library.files.length})
              </div>
              
              {library.files.map((file, idx) => (
                <div
                  key={file.fileId}
                  onClick={() => handleSelectFile(file)}
                  style={{
                    marginBottom: '10px',
                    padding: '8px',
                    background: selectedFile?.fileId === file.fileId ? '#001f3f' : 'white',
                    border: selectedFile?.fileId === file.fileId ? '2px solid #001f3f' : '1px solid #ddd',
                    borderRadius: '6px',
                    cursor: 'pointer',
                    transition: 'all 0.2s',
                    boxShadow: selectedFile?.fileId === file.fileId ? '0 2px 8px rgba(0,31,63,0.3)' : 'none'
                  }}
                  onMouseEnter={(e) => {
                    if (selectedFile?.fileId !== file.fileId) {
                      e.currentTarget.style.background = '#e9ecef';
                      e.currentTarget.style.borderColor = '#001f3f';
                    }
                  }}
                  onMouseLeave={(e) => {
                    if (selectedFile?.fileId !== file.fileId) {
                      e.currentTarget.style.background = 'white';
                      e.currentTarget.style.borderColor = '#ddd';
                    }
                  }}
                >
                  {file.fileType.startsWith('image/') ? (
                    <img
                      src={getFileDataUrl(file)}
                      alt={file.fileName}
                      style={{
                        width: '100%',
                        height: '100px',
                        objectFit: 'contain',
                        marginBottom: '5px',
                        background: selectedFile?.fileId === file.fileId ? 'rgba(255,255,255,0.1)' : '#f8f9fa',
                        borderRadius: '4px',
                        padding: '5px'
                      }}
                    />
                  ) : (
                    <div style={{
                      width: '100%',
                      height: '100px',
                      display: 'flex',
                      alignItems: 'center',
                      justifyContent: 'center',
                      background: selectedFile?.fileId === file.fileId ? 'rgba(255,255,255,0.1)' : '#f8f9fa',
                      borderRadius: '4px',
                      marginBottom: '5px'
                    }}>
                      <i className="bi bi-file-pdf" style={{
                        fontSize: '40px',
                        color: selectedFile?.fileId === file.fileId ? 'white' : '#d32f2f'
                      }}></i>
                    </div>
                  )}
                  <div style={{
                    fontSize: '11px',
                    fontWeight: '600',
                    color: selectedFile?.fileId === file.fileId ? 'white' : '#001f3f',
                    wordBreak: 'break-word',
                    marginBottom: '5px'
                  }}>
                    <i className="bi bi-file-earmark me-1"></i>
                    {file.fileName}
                  </div>
                  <div style={{display: 'flex', gap: '4px', marginTop: '5px'}}>
                    <button
                      className="btn btn-sm"
                      onClick={(e) => {
                        e.stopPropagation();
                        deleteFile(file.fileId, file.fileName);
                      }}
                      style={{
                        fontSize: '10px',
                        padding: '2px 8px',
                        background: selectedFile?.fileId === file.fileId ? 'rgba(220,53,69,0.9)' : '#dc3545',
                        color: 'white',
                        border: 'none',
                        flex: 1
                      }}
                      title="Delete"
                    >
                      <i className="bi bi-trash"></i>
                    </button>
                  </div>
                </div>
              ))}
            </div>
            
            {/* Main Viewer */}
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
              {/* Viewer Area */}
              <div
                ref={viewerRef}
                style={{
                  flex: 1,
                  background: 'linear-gradient(45deg, #f8f9fa 25%, transparent 25%, transparent 75%, #f8f9fa 75%, #f8f9fa), linear-gradient(45deg, #f8f9fa 25%, transparent 25%, transparent 75%, #f8f9fa 75%, #f8f9fa)',
                  backgroundSize: '20px 20px',
                  backgroundPosition: '0 0, 10px 10px',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  overflow: 'hidden',
                  position: 'relative',
                  cursor: zoomLevel > 100 ? (isPanning ? 'grabbing' : 'grab') : 'default'
                }}
                onMouseDown={handleMouseDown}
                onMouseMove={handleMouseMove}
                onMouseUp={handleMouseUp}
                onMouseLeave={handleMouseUp}
              >
                {selectedFile && (
                  selectedFile.fileType.startsWith('image/') ? (
                    <img
                      src={getFileDataUrl(selectedFile)}
                      alt={selectedFile.fileName}
                      style={{
                        maxWidth: zoomLevel > 100 ? 'none' : '100%',
                        maxHeight: zoomLevel > 100 ? 'none' : '100%',
                        width: zoomLevel > 100 ? `${zoomLevel}%` : 'auto',
                        height: 'auto',
                        transform: `translate(${panPosition.x}px, ${panPosition.y}px)`,
                        boxShadow: '0 4px 20px rgba(0,0,0,0.2)',
                        border: '3px solid #001f3f',
                        borderRadius: '4px',
                        userSelect: 'none',
                        pointerEvents: 'none'
                      }}
                      draggable="false"
                    />
                  ) : (
                    <div style={{
                      width: '80%',
                      height: '80%',
                      display: 'flex',
                      flexDirection: 'column',
                      alignItems: 'center',
                      justifyContent: 'center',
                      background: 'white',
                      borderRadius: '8px',
                      border: '3px solid #001f3f',
                      boxShadow: '0 4px 20px rgba(0,0,0,0.2)'
                    }}>
                      <i className="bi bi-file-pdf" style={{fontSize: '120px', color: '#d32f2f', marginBottom: '20px'}}></i>
                      <h5 style={{color: '#001f3f', marginBottom: '10px'}}>PDF Document</h5>
                      <p className="text-muted" style={{marginBottom: '20px'}}>{selectedFile.fileName}</p>
                      <button
                        className="btn btn-navy"
                        onClick={() => window.open(getFileDataUrl(selectedFile), '_blank')}
                      >
                        <i className="bi bi-box-arrow-up-right me-2"></i>Open in New Tab
                      </button>
                    </div>
                  )
                )}
              </div>
              
              {/* Control Bar */}
              <div style={{
                padding: '15px 20px',
                background: 'white',
                borderTop: '2px solid #001f3f',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                flexWrap: 'wrap',
                gap: '10px'
              }}>
                {/* Zoom Controls */}
                <div style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                  <button
                    className="btn btn-sm btn-navy"
                    onClick={handleZoomOut}

function InventoryView({ hasPermission, currentUser }) {
  const [inventory, setInventory] = useState([]);
  const [allInventory, setAllInventory] = useState([]); // Store full inventory
  const [loading, setLoading] = useState(true);
  const [searchTerm, setSearchTerm] = useState('');
  const [searching, setSearching] = useState(false);
  const [showDetailsModal, setShowDetailsModal] = useState(false);
  const [currentItem, setCurrentItem] = useState(null);
  const [itemDetails, setItemDetails] = useState(null);
  const [lowStockCount, setLowStockCount] = useState(0);
  
  // Category filter states
  const [categories, setCategories] = useState([]);
  const [selectedCategories, setSelectedCategories] = useState([]);
  const [loadingCategories, setLoadingCategories] = useState(true);
  
  const tableRef = useRef(null);
  const dataTableRef = useRef(null);

  useEffect(() => {
    loadCategories();
    loadInventory();
    
    return () => {
      if (dataTableRef.current) {
        try {
          dataTableRef.current.destroy();
        } catch (e) {
          // Ignore
        }
        dataTableRef.current = null;
      }
    };
  }, []);

  // Load categories from backend
  const loadCategories = () => {
    setLoadingCategories(true);
    
    google.script.run
      .withSuccessHandler((result) => {
        requestAnimationFrame(() => {
          setLoadingCategories(false);
          
          if (result && result.success) {
            // Extract category names from the result
            const categoryNames = (result.categories || []).map(cat => cat.categoryName);
            setCategories(categoryNames);
          } else {
            console.error('Failed to load categories:', result);
            setCategories([]);
          }
        });
      })
      .withFailureHandler((error) => {
        console.error('Load categories error:', error);
        setLoadingCategories(false);
        setCategories([]);
      })
      .getCategories();
  };

  const loadInventory = (skipLoading = false) => {
    if (!skipLoading) {
      setLoading(true);
    }
    
    google.script.run
      .withSuccessHandler((result) => {
        requestAnimationFrame(() => {
          if (!skipLoading) {
            setLoading(false);
          }
          
          // Safety check for null/undefined result
          if (result && result.success) {
            const inventoryData = result.inventory || [];
            setInventory(inventoryData);
            setAllInventory(inventoryData); // Store full inventory
            
            // Count low stock items
            const lowStock = inventoryData.filter(item => item.reorderRequired === 'Yes').length;
            setLowStockCount(lowStock);
            
            if (dataTableRef.current) {
              try {
                dataTableRef.current.destroy();
              } catch (e) {
                // Already destroyed
              }
              dataTableRef.current = null;
            }
            
            setTimeout(() => {
              if (tableRef.current) {
                initDataTable(inventoryData);
              }
            }, 300);
          } else {
            console.error('❌ Load inventory failed:', result);
            console.error('Result object:', JSON.stringify(result));
            alert('INVENTORY ERROR: ' + JSON.stringify(result));
            showAlert('error', result ? result.message : 'Failed to load inventory');
            setInventory([]);
            setAllInventory([]);
          }
        });
      })
      .withFailureHandler((error) => {
        console.error('Load inventory error:', error);
        if (!skipLoading) {
          setLoading(false);
        }
        showAlert('error', 'Failed to load inventory: ' + error.message);
        setInventory([]);
        setAllInventory([]);
      })
      .getInventorySummary();
  };

  // Handle category chip click
  const handleCategoryClick = (categoryName) => {
    requestAnimationFrame(() => {
      let newSelected;
      
      if (selectedCategories.includes(categoryName)) {
        // Remove category from selection
        newSelected = selectedCategories.filter(cat => cat !== categoryName);
      } else {
        // Add category to selection
        newSelected = [...selectedCategories, categoryName];
      }
      
      setSelectedCategories(newSelected);
      filterInventoryByCategories(newSelected);
    });
  };

  // Handle "All" button click
  const handleClearFilters = () => {
    requestAnimationFrame(() => {
      setSelectedCategories([]);
      setInventory(allInventory);
      
      // Reinitialize DataTable with all data
      if (dataTableRef.current) {
        try {
          dataTableRef.current.destroy();
          dataTableRef.current = null;
        } catch (e) {
          // Already destroyed
        }
      }
      
      setTimeout(() => {
        if (tableRef.current) {
          initDataTable(allInventory);
        }
      }, 100);
      
      showAlert('info', 'Showing all inventory items');
    });
  };

  // Filter inventory by selected categories
  const filterInventoryByCategories = (selectedCats) => {
    if (!selectedCats || selectedCats.length === 0) {
      // No categories selected, show all
      setInventory(allInventory);
      
      if (dataTableRef.current) {
        try {
          dataTableRef.current.destroy();
          dataTableRef.current = null;
        } catch (e) {
          // Already destroyed
        }
      }
      
      setTimeout(() => {
        if (tableRef.current) {
          initDataTable(allInventory);
        }
      }, 100);
      
      return;
    }
    
    // Filter inventory on frontend
    const filtered = allInventory.filter(item => {
      return selectedCats.some(cat => 
        item.category.toLowerCase() === cat.toLowerCase()
      );
    });
    
    setInventory(filtered);
    
    // Reinitialize DataTable with filtered data
    if (dataTableRef.current) {
      try {
        dataTableRef.current.destroy();
        dataTableRef.current = null;
      } catch (e) {
        // Already destroyed
      }
    }
    
    setTimeout(() => {
      if (tableRef.current) {
        initDataTable(filtered);
      }
    }, 100);
    
    showAlert('info', filtered.length + ' item(s) found in selected categories');
  };

  const initDataTable = (data) => {
    if (!tableRef.current) {
      return;
    }

    if (dataTableRef.current) {
      try {
        dataTableRef.current.destroy();
      } catch (e) {
        console.log('DataTable destroy error:', e.message);
      }
      dataTableRef.current = null;
    }

    setTimeout(() => {
      try {
        dataTableRef.current = $(tableRef.current).DataTable({
          data: data,
          deferRender: true,
          processing: true,
          autoWidth: false,
          stateSave: false,
          columns: [
            { data: 'itemId', title: 'Item ID' },
            { data: 'modelNumber', title: 'Model Number' },
            { data: 'itemName', title: 'Item Name' },
            { data: 'category', title: 'Category' },
            { 
              data: 'totalStock', 
              title: 'Total Stock',
              render: function(data) {
                return '<span class="badge bg-info" style="font-size: 14px;">' + (data || 0) + '</span>';
              }
            },
            { 
              data: 'reorderLevel', 
              title: 'Reorder Level'
            },
            { 
              data: 'reorderRequired', 
              title: 'Reorder',
              render: function(data) {
                if (data === 'Yes') {
                  return '<span class="badge bg-danger">Yes</span>';
                } else {
                  return '<span class="badge bg-success">No</span>';
                }
              }
            },
            {
              data: 'stockByLocation',
              title: 'WH-A',
              render: function(data) {
                return data['Warehouse-A'] || 0;
              }
            },
            {
              data: 'stockByLocation',
              title: 'WH-B',
              render: function(data) {
                return data['Warehouse-B'] || 0;
              }
            },
            {

// Supplier Autocomplete Input Component
    function SupplierAutocompleteInput({ value, onChange, suppliers, onSelect, placeholder }) {
      const [showDropdown, setShowDropdown] = useState(false);
      const [filteredSuppliers, setFilteredSuppliers] = useState([]);
      const wrapperRef = useRef(null);

      useEffect(() => {
        function handleClickOutside(event) {
          if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
            setShowDropdown(false);
          }
        }
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleInputChange = (e) => {
        const inputValue = e.target.value;
        onChange(inputValue);

        if (inputValue.length > 0) {
          const filtered = suppliers.filter(supplier =>
            supplier.name.toLowerCase().includes(inputValue.toLowerCase()) ||
            (supplier.companyName && supplier.companyName.toLowerCase().includes(inputValue.toLowerCase())) ||
            (supplier.id && supplier.id.toLowerCase().includes(inputValue.toLowerCase()))
          );
          setFilteredSuppliers(filtered);
          setShowDropdown(filtered.length > 0);
        } else {
          setShowDropdown(false);
        }
      };

      const handleSelectSupplier = (supplier) => {
        onSelect(supplier);
        setShowDropdown(false);
      };

      return (
        <div className="autocomplete-wrapper" ref={wrapperRef}>
          <input
            type="text"
            className="form-control"
            value={value}
            onChange={handleInputChange}
            placeholder={placeholder}
            autoComplete="off"
          />
          {showDropdown && (
            <div className="autocomplete-dropdown">
              {filteredSuppliers.map((supplier, index) => (
                <div
                  key={index}
                  className="autocomplete-item"
                  onClick={() => handleSelectSupplier(supplier)}
                >
                  <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                    <div>
                      <strong>{supplier.name}</strong> - {supplier.companyName}
                    </div>
                    <span className="badge bg-info" style={{fontSize: '10px'}}>
                      {supplier.id}
                    </span>
                  </div>
                  {supplier.phone && (
                    <div style={{fontSize: '11px', color: '#6c757d'}}>
                      📞 {supplier.phone} | 📧 {supplier.email}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

                    setPurchaseActionPanelOpen(false);
                    window.deletePO(selectedPurchaseForActions.poNumber);
                  }}
                >
                  <i className="bi bi-trash-fill"></i>
                  <span>Delete Purchase Order</span>
                </button>
              </div>
            </>
          )}
        </div>
      </div>

      {/* View PO Modal */}
      {showViewPOModal && currentPO && (
        <ViewPOModalContent 
          po={currentPO}
          setShowViewPOModal={setShowViewPOModal}
        />
      )}

      {/* Edit PO Modal */}
      {showEditPOModal && (
        <EditPOModalContent 
          poForm={poForm}
          setPoForm={setPoForm}
          suppliers={suppliers}
          products={products}
          handleSupplierChange={handleSupplierChange}
          addPOItem={addPOItem}

          setShowEditPOModal={setShowEditPOModal}
          saving={saving}
        />
      )}
      
      {/* These will be in the next file... */}
    </div>
  );
}

              <TechnicalLibraryView currentUser={currentUser} />
            )}

            {/* User Management View */}
            {activeMenu === 'user-management' && userPermissions.pageAccess && userPermissions.pageAccess['user-management'] && (
              <UserManagementView />
            )}

            {/* Dashboard View */}
            {activeMenu === 'dashboard' && (
              <DashboardView />
            )}
          </div>
        </div>
      );
    }
    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

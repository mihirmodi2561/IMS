      );
    }

    // All Invoices View Component -- Fun Invoice
    function AllInvoicesView() {
      const [allInvoices, setAllInvoices] = useState([]);
      const [filteredInvoices, setFilteredInvoices] = useState([]);
      const [loading, setLoading] = useState(true);
      const [fromDate, setFromDate] = useState('');
      const [toDate, setToDate] = useState('');
      const tableRef = useRef(null);
      const dataTableRef = useRef(null);
      
      // Manual Invoice Modal States
      const [showManualInvoiceModal, setShowManualInvoiceModal] = useState(false);
      const [customers, setCustomers] = useState([]);
      const [items, setItems] = useState([]);
      const [savingManualInvoice, setSavingManualInvoice] = useState(false);
      const [manualInvoice, setManualInvoice] = useState({
        date: new Date().toISOString().slice(0, 10),
        customerId: '',
        objective: '',
        materialCost: 0,
        installationCost: 0,
        salesTax: 0,
        downPayment: 0,
        terms: 'Payment due within 30 days',
        preparedBy: 'admin'
      });
      const [selectedCustomer, setSelectedCustomer] = useState(null);
      const [customerIdInput, setCustomerIdInput] = useState('');
      const [lineItems, setLineItems] = useState([
        { itemNumber: 1, modelNumber: '', itemName: '', category: '', qty: 1, lockedField: '' }
      ]);
      
      // View Invoice Modal States
      const [showViewInvoiceModal, setShowViewInvoiceModal] = useState(false);
      const [viewingInvoice, setViewingInvoice] = useState(null);
      const [loadingInvoiceDetails, setLoadingInvoiceDetails] = useState(false);

      useEffect(() => {
        loadInvoices();
      }, []);

      useEffect(() => {
        filterInvoices();
      }, [allInvoices, fromDate, toDate]);

      const filterInvoices = () => {
        let filtered = [...allInvoices];

        if (fromDate) {
          const from = new Date(fromDate);
          filtered = filtered.filter(inv => new Date(inv.date) >= from);
        }

        if (toDate) {
          const to = new Date(toDate);
          to.setHours(23, 59, 59, 999);
          filtered = filtered.filter(inv => new Date(inv.date) <= to);
        }

        setFilteredInvoices(filtered);

        // Update DataTable if it exists
        if (dataTableRef.current) {
          try {
            dataTableRef.current.clear();
            dataTableRef.current.rows.add(filtered);
            dataTableRef.current.draw();
          } catch (e) {
            console.log('DataTable update error:', e);
          }
        }
      };


        const loadInvoices = (skipLoading = false) => {
          if (!skipLoading) setLoading(true);

          google.script.run
            .withSuccessHandler((result) => {
              setLoading(false);
              if (result && result.success) {
                setAllInvoices(result.invoices || []);
                setTimeout(() => initializeDataTable(result.invoices || []), 100);
              }
            })
            .withFailureHandler((error) => {
              setLoading(false);
              showAlert('danger', 'Failed to load: ' + error.message);
            })
            .getInvoices();
        };

      const showAlert = (type, message) => {
        const Toast = Swal.mixin({
          toast: true,
          position: 'top-end',
          showConfirmButton: false,
          timer: 3000,
          timerProgressBar: true,
        });

        const iconType = type === 'success' ? 'success' :
                        type === 'danger' ? 'error' :
                        type === 'warning' ? 'warning' : 'info';

        Toast.fire({
          icon: iconType,
          title: message
        });
      };

      const initializeDataTable = (data) => {
        if (dataTableRef.current) {
          try {
            dataTableRef.current.destroy();
          } catch (e) {
            console.log('DataTable destroy error:', e);
          }
        }

          // Clear the table HTML
          if (tableRef.current) {
            $(tableRef.current).empty();
          }
          
        setTimeout(() => {
          dataTableRef.current = $(tableRef.current).DataTable({
            data: data,
            columns: [
              { data: 'invoiceNumber', title: 'Invoice #' },
              {
                data: 'date',
                title: 'Date',
                render: function(data) {
                  return new Date(data).toLocaleDateString();
                }
              },
              {
                data: 'dueDate',
                title: 'Due Date',
                render: function(data) {
                  return new Date(data).toLocaleDateString();
                }
              },
              { data: 'customerName', title: 'Customer' },
              {
                data: 'grandTotal',
                title: 'Total',
                render: function(data) {
                  return '$' + parseFloat(data || 0).toFixed(2);
                }
              },
              {
                data: 'status',
                title: 'Status',
                render: function(data) {
                  const badgeClass = data === 'Paid' ? 'bg-success' : 'bg-warning';
                  return `<span class="badge ${badgeClass}">${data}</span>`;
                }
              },
              {
                data: 'quoteNumber',
                title: 'Quote #',
                render: function(data) {
                  return data || '-';
                }
              },
              {
                data: null,
                title: 'Actions',
                orderable: false,
                render: function(data, type, row) {
                  const statusButton = row.status === 'Paid'
                    ? `<button class="btn btn-sm btn-warning" onclick="window.markUnpaid('${row.invoiceNumber}')" title="Mark as Unpaid"><i class="bi bi-x-circle"></i></button>`
                    : `<button class="btn btn-sm btn-success" onclick="window.markPaid('${row.invoiceNumber}')" title="Mark as Paid"><i class="bi bi-check-circle"></i></button>`;

                  return `
                    <div class="btn-group btn-group-sm" role="group">
                      <button class="btn btn-secondary" onclick="window.viewInvoice('${row.invoiceNumber}')" title="View Invoice">
                        <i class="bi bi-eye"></i>
                      </button>
                      <button class="btn btn-primary" onclick="window.downloadInvoicePDF('${row.invoiceNumber}')" title="Download PDF">
                        <i class="bi bi-file-pdf"></i>
                      </button>
                      <button class="btn btn-info" onclick="window.emailInvoice('${row.invoiceNumber}')" title="Send Email">
                        <i class="bi bi-envelope"></i>
                      </button>
                      ${statusButton}
                      <button class="btn btn-danger" onclick="window.deleteInvoice('${row.invoiceNumber}')" title="Delete Invoice">
                        <i class="bi bi-trash"></i>
                      </button>
                    </div>
                  `;
                }
              }
            ],
            order: [[0, 'desc']],
            pageLength: 25,
            responsive: true,
            dom: '<"row"<"col-sm-12 col-md-6"l><"col-sm-12 col-md-6"f>>' +
                 '<"row"<"col-sm-12"tr>>' +
                 '<"row"<"col-sm-12 col-md-5"i><"col-sm-12 col-md-7"p>>'
          });
        }, 100);
      };

      useEffect(() => {
        window.viewInvoice = (invoiceNumber) => {
          setLoadingInvoiceDetails(true);
          setShowViewInvoiceModal(true);
          
          google.script.run
            .withSuccessHandler((result) => {
              setLoadingInvoiceDetails(false);
              if (result && result.success) {
                setViewingInvoice(result.invoice);
              } else {
                showAlert('danger', result.message || 'Failed to load invoice');
                setShowViewInvoiceModal(false);
              }
            })
            .withFailureHandler((error) => {
              setLoadingInvoiceDetails(false);
              showAlert('danger', 'Error loading invoice: ' + error.message);
              setShowViewInvoiceModal(false);
            })
            .getInvoiceByNumber(invoiceNumber);
        };
        
        window.downloadInvoicePDF = (invoiceNumber) => {
          showAlert('info', 'Generating PDF...');
          google.script.run
            .withSuccessHandler((result) => {
              if (result && result.success) {
                // Create a download link for the PDF
                const linkSource = `data:application/pdf;base64,${result.pdf}`;
                const downloadLink = document.createElement('a');
                downloadLink.href = linkSource;
                downloadLink.download = result.filename;
                downloadLink.click();
                showAlert('success', 'PDF downloaded successfully');
              } else {
                showAlert('danger', result.message);
              }
            })
            .withFailureHandler((error) => {
              showAlert('danger', 'Failed to generate PDF: ' + error.message);
            })
            .generateInvoicePDF(invoiceNumber);
        };

        window.emailInvoice = (invoiceNumber) => {
          const invoice = allInvoices.find(inv => String(inv.invoiceNumber) === String(invoiceNumber));
          if (!invoice) {
            showAlert('danger', 'Invoice not found');
            return;
          }

          if (!invoice.customerEmail) {
            showAlert('danger', 'No email address found for this customer');
            return;
          }

          Swal.fire({
            title: 'Send Invoice via Email',
            html: `Send invoice to: <strong>${invoice.customerEmail}</strong>?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#001f3f',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Send Email'
          }).then((result) => {
            if (result.isConfirmed) {
              showAlert('info', 'Sending email...');
              google.script.run
                .withSuccessHandler((result) => {
                  if (result && result.success) {
                    showAlert('success', result.message);
                  } else {
                    showAlert('danger', result.message);
                  }
                })
                .withFailureHandler((error) => {
                  showAlert('danger', 'Failed to send email: ' + error.message);
                })
                .sendQuoteEmail({
                  type: 'invoice',
                  number: invoice.invoiceNumber,
                  email: invoice.customerEmail,
                  customerName: invoice.customerName,
                  lineItems: invoice.lineItems,
                  subtotal: invoice.subtotal,
                  taxAmount: invoice.taxAmount,
                  other: invoice.other,
                  total: invoice.total
                });
            }
          });
        };

        window.markPaid = (invoiceNumber) => {
          google.script.run
            .withSuccessHandler((result) => {
              if (result && result.success) {
                showAlert('success', 'Invoice marked as Paid');
                loadInvoices(true);
              } else {
                showAlert('danger', result.message);
              }
            })
            .withFailureHandler((error) => {
              showAlert('danger', 'Failed to update invoice: ' + error.message);
            })
            .updateInvoiceStatus(invoiceNumber, 'Paid');
        };

        window.markUnpaid = (invoiceNumber) => {
          google.script.run
            .withSuccessHandler((result) => {
              if (result && result.success) {
                showAlert('success', 'Invoice marked as Unpaid');
                loadInvoices(true);
              } else {
                showAlert('danger', result.message);
              }
            })
            .withFailureHandler((error) => {
              showAlert('danger', 'Failed to update invoice: ' + error.message);
            })
            .updateInvoiceStatus(invoiceNumber, 'Unpaid');
        };

        window.deleteInvoice = (invoiceNumber) => {
          Swal.fire({
            title: 'Are you sure?',
            text: 'Do you want to delete this invoice?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Yes, delete it!'
          }).then((result) => {
            if (result.isConfirmed) {
              google.script.run
                .withSuccessHandler((result) => {
                  if (result && result.success) {
                    showAlert('success', 'Invoice deleted successfully');
                    loadInvoices(true);
                  } else {
                    showAlert('danger', result.message);
                  }
                })
                .withFailureHandler((error) => {
                  showAlert('danger', 'Failed to delete invoice: ' + error.message);
                })
                .deleteInvoice(invoiceNumber);
            }
          });
        };
      }, [allInvoices]);

      // Load customers and items when modal opens
      useEffect(() => {
        if (showManualInvoiceModal) {
          // Load customers
          google.script.run
            .withSuccessHandler((result) => {
              if (result && result.success) {
                setCustomers(result.customers || []);
              }
            })
            .getCustomers();
          
          // Load items
          google.script.run
            .withSuccessHandler((result) => {
              if (result && result.success) {
                setItems(result.items || []);
              }
            })
            .getAllItems();
        }
      }, [showManualInvoiceModal]);

      // Select customer from autocomplete
      const selectCustomer = (customer) => {
        setSelectedCustomer({
          customerId: customer.id,              // Backend uses 'id'
          customerName: customer.name,          // Backend uses 'name'
          company: customer.companyName,        // Backend uses 'companyName'
          address: customer.streetAddress,      // Backend uses 'streetAddress'
          city: customer.city,
          state: '',                            // Not in backend
          zip: '',                              // Not in backend
          phone: customer.phone,
          email: customer.email
        });
        setCustomerIdInput(customer.id);        // Backend uses 'id'
      };

      // Find customer by ID
      const findCustomerById = () => {
        if (!customerIdInput.trim()) {
          showAlert('error', 'Please enter Customer ID');
          return;
        }
        
        const customer = customers.find(c => c.id === customerIdInput.trim());
        if (customer) {
          selectCustomer(customer);
          showAlert('success', 'Customer found: ' + customer.name);
        } else {
          setSelectedCustomer(null);
          showAlert('error', 'Customer not found with ID: ' + customerIdInput);
        }
      };

      // Handle customer selection
      const handleCustomerSelect = (customerId) => {
        const customer = customers.find(c => c.customerId === customerId);
        if (customer) {
          setSelectedCustomer(customer);
        } else {
          setSelectedCustomer(null);
        }
      };

      // Calculate totals for manual invoice
      const calculateManualInvoiceTotals = () => {
        const materialCost = parseFloat(manualInvoice.materialCost) || 0;
        const installationCost = parseFloat(manualInvoice.installationCost) || 0;
        const subTotal = materialCost + installationCost;
        const salesTax = parseFloat(manualInvoice.salesTax) || 0;
        const grandTotal = subTotal + salesTax;
        const downPayment = parseFloat(manualInvoice.downPayment) || 0;
        const finalPayment = grandTotal - downPayment;
        
        return { subTotal, grandTotal, finalPayment };
      };

      // Update line item by model number
      const updateItemByModel = (index, modelNumber) => {
        const selectedItem = items.find(item => item.modelNumber === modelNumber);
        if (selectedItem) {
          const updated = [...lineItems];
          updated[index] = {
            ...updated[index],
            modelNumber: selectedItem.modelNumber,
            itemName: selectedItem.itemName,
            category: selectedItem.category,
            lockedField: 'name'
          };
          setLineItems(updated);
        } else {
          const updated = [...lineItems];
          updated[index] = {
            ...updated[index],
            modelNumber: modelNumber,
            itemName: '',
            category: '',
            lockedField: ''
          };
          setLineItems(updated);
        }
      };

      // Update line item by name
      const updateItemByName = (index, itemName) => {
        const selectedItem = items.find(item => item.itemName === itemName);
        if (selectedItem) {
          const updated = [...lineItems];
          updated[index] = {
            ...updated[index],
            modelNumber: selectedItem.modelNumber,
            itemName: selectedItem.itemName,
            category: selectedItem.category,
            lockedField: 'model'
          };
          setLineItems(updated);
        } else {
          const updated = [...lineItems];
          updated[index] = {
            ...updated[index],
            modelNumber: '',
            itemName: itemName,
            category: '',
            lockedField: ''
          };
          setLineItems(updated);
        }
      };

      // Update line item QTY
      const updateItemQty = (index, qty) => {
        const updated = [...lineItems];
        updated[index].qty = parseInt(qty) || 1;
        setLineItems(updated);
      };

      // Add new line item
      const addLineItem = () => {
        setLineItems([
          ...lineItems,
          { itemNumber: lineItems.length + 1, modelNumber: '', itemName: '', category: '', qty: 1, lockedField: '' }
        ]);
      };

      // Remove line item
      const removeLineItem = (index) => {
        if (lineItems.length > 1) {
          const updated = lineItems.filter((_, i) => i !== index);
          setLineItems(updated.map((item, i) => ({ ...item, itemNumber: i + 1 })));
        }
      };

      // Save manual invoice
      const saveManualInvoice = () => {
        // Validation
        if (!selectedCustomer) {
          showAlert('error', 'Please select a customer');
          return;
        }

        const validItems = lineItems.filter(item => item.modelNumber && item.qty > 0);
        if (validItems.length === 0) {
          showAlert('error', 'Please add at least one item');
          return;
        }

        const totals = calculateManualInvoiceTotals();

        const invoiceData = {
          date: manualInvoice.date,
          customerId: selectedCustomer.customerId,
          customerName: selectedCustomer.customerName,
          customerCompany: selectedCustomer.company || '',
          customerAddress: selectedCustomer.address || '',
          customerCity: (selectedCustomer.city || '') + (selectedCustomer.state ? ', ' + selectedCustomer.state : '') + (selectedCustomer.zip ? ' ' + selectedCustomer.zip : ''),
          customerPhone: selectedCustomer.phone || '',
          customerEmail: selectedCustomer.email || '',
          objective: manualInvoice.objective,
          lineItems: validItems,
          materialCost: manualInvoice.materialCost,
          installationCost: manualInvoice.installationCost,
          subTotal: totals.subTotal,
          salesTax: manualInvoice.salesTax,
          grandTotal: totals.grandTotal,
          downPayment: manualInvoice.downPayment,
          finalPayment: totals.finalPayment,
          terms: manualInvoice.terms,
          preparedBy: manualInvoice.preparedBy
        };

        setSavingManualInvoice(true);

        google.script.run
          .withSuccessHandler((result) => {
            setSavingManualInvoice(false);
            if (result && result.success) {
              showAlert('success', 'Manual invoice created: ' + result.invoiceNumber);
              setShowManualInvoiceModal(false);
              loadInvoices(true);
              // Reset form
              setManualInvoice({
                date: new Date().toISOString().slice(0, 10),
                customerId: '',
                objective: '',

    // User Management View Component -- Fun User
    function UsersView() {
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [showModal, setShowModal] = useState(false);
      const [modalMode, setModalMode] = useState('add');
      const [currentUser, setCurrentUser] = useState({
        username: '',
        password: '',
        access: 'Allow',
        role: 'user'
      });
      const [oldUsername, setOldUsername] = useState('');
      const tableRef = useRef(null);
      const dataTableRef = useRef(null);

      useEffect(() => {
        loadUsers();
      }, []);

      const loadUsers = (refresh = false) => {
        if (!refresh) {
          setLoading(true);
        }

        google.script.run
          .withSuccessHandler((result) => {
            if (result && result.success) {
              setUsers(result.users);

              if (refresh && dataTableRef.current) {
                // Update existing table without destroying it
                dataTableRef.current.clear();
                dataTableRef.current.rows.add(result.users);
                dataTableRef.current.draw();
              } else {
                setLoading(false);
                setTimeout(() => initDataTable(result.users), 100);
              }
            } else {
              showAlert('danger', result.message);
              setLoading(false);
            }
          })
          .withFailureHandler((error) => {
            showAlert('danger', 'Failed to load users: ' + error.message);
            setLoading(false);
          })
          .getUsers();
      };

      const initDataTable = (data) => {
        if (dataTableRef.current) {
          dataTableRef.current.destroy();
        }

        dataTableRef.current = $(tableRef.current).DataTable({
          data: data,
          columns: [
            {
              data: null,
              title: '#',
              orderable: false,
              searchable: false,
              render: function(data, type, row, meta) {
                return meta.row + 1;
              },
              width: '50px'
            },
            { data: 'username', title: 'Username' },
            {
              data: 'role',
              title: 'Role',
              render: function(data) {
                return data === 'admin'
                  ? '<span class="badge bg-danger">Admin</span>'
                  : '<span class="badge bg-secondary">User</span>';
              }
            },
            {
              data: 'access',
              title: 'Access',
              render: function(data) {
                return data === 'Allow'
                  ? '<span class="badge bg-success">Allowed</span>'
                  : '<span class="badge bg-warning">Blocked</span>';
              }
            },
            {
              data: null,
              title: 'Actions',
              orderable: false,
              render: function(data, type, row) {
                return `
                  <button class="btn-action btn-edit" onclick="window.editUser('${row.username}')" title="Edit User">
                    <i class="bi bi-pencil-fill"></i>
                  </button>
                  <button class="btn-action btn-delete" onclick="window.deleteUser('${row.username}')" title="Delete User">
                    <i class="bi bi-trash-fill"></i>
                  </button>
                `;
              }
            }
          ],
          responsive: true,
          pageLength: 10,
          order: [[1, 'asc']],
          language: {
            emptyTable: "No users found"
          }
        });
      };

      useEffect(() => {
        window.editUser = (username) => {
          const user = users.find(u => u.username === username);
          if (user) {
            setCurrentUser({
              username: user.username,
              password: '',
              access: user.access,
              role: user.role
            });
            setOldUsername(username);
            setModalMode('edit');
            setShowModal(true);
          }
        };

        window.deleteUser = (username) => {
          Swal.fire({
            title: 'Are you sure?',
            text: "You won't be able to revert this!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#001f3f',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, delete it!'
          }).then((result) => {
            if (result.isConfirmed) {
              setDeleting(true);
              google.script.run
                .withSuccessHandler((result) => {
                  setDeleting(false);
                  if (result && result.success) {
                    Swal.fire('Deleted!', 'User has been deleted.', 'success');
                    loadUsers(true);
                  } else {
                    Swal.fire('Error!', result.message, 'error');
                  }
                })
                .withFailureHandler((error) => {
                  setDeleting(false);
                  Swal.fire('Error!', 'Failed to delete user: ' + error.message, 'error');
                })
                .deleteUser(username);
            }
          });
        };

        return () => {
          delete window.editUser;
          delete window.deleteUser;
        };
      }, [users]);

      const showAlert = (type, message) => {
        const Toast = Swal.mixin({
          toast: true,
          position: 'top-end',
          showConfirmButton: false,
          timer: 3000,
          timerProgressBar: true,
          didOpen: (toast) => {
            toast.addEventListener('mouseenter', Swal.stopTimer)
            toast.addEventListener('mouseleave', Swal.resumeTimer)
          }
        });

        const iconType = type === 'success' ? 'success' :
                        type === 'danger' ? 'error' :
                        type === 'warning' ? 'warning' : 'info';

        Toast.fire({
          icon: iconType,
          title: message
        });
      };

      const handleAddUser = () => {
        setCurrentUser({
          username: '',
          password: '',
          access: 'Allow',
          role: 'user'
        });
        setOldUsername('');
        setModalMode('add');
        setShowModal(true);
      };

      const handleSaveUser = () => {
        if (!currentUser.username) {
          showAlert('warning', 'Please enter username');
          return;
        }

        if (modalMode === 'add' && !currentUser.password) {
          showAlert('warning', 'Please enter password');
          return;
        }

        setSaving(true);

        if (modalMode === 'add') {
          google.script.run
            .withSuccessHandler((result) => {
              setSaving(false);
              if (result && result.success) {
                showAlert('success', 'User added successfully');
                setShowModal(false);
                loadUsers(true);
              } else {
                showAlert('danger', result.message);
              }
            })
            .withFailureHandler((error) => {
              setSaving(false);
              showAlert('danger', 'Failed to add user: ' + error.message);
            })
            .addUser(currentUser);
        } else {
          google.script.run
            .withSuccessHandler((result) => {
              setSaving(false);
              if (result && result.success) {
                showAlert('success', 'User updated successfully');
                setShowModal(false);
                loadUsers(true);
              } else {
                showAlert('danger', result.message);
              }
            })
            .withFailureHandler((error) => {
              setSaving(false);
              showAlert('danger', 'Failed to update user: ' + error.message);
            })
            .updateUser(oldUsername, currentUser);
        }
      };

      return (
        <div className="list-view-container">
          <div className="list-view-header">
            <h1 className="list-view-title">
              <i className="bi bi-people-fill me-2"></i>
              User Management
            </h1>
            <button className="btn btn-navy" onClick={handleAddUser}>
              <i className="bi bi-plus-circle me-2"></i>
              Add New User
            </button>
          </div>

          <div className="data-card">
            {loading ? (
              <div className="text-center py-5">
                <div className="spinner-border text-primary" role="status">
                  <span className="visually-hidden">Loading...</span>
                </div>
              </div>
            ) : (
              <table ref={tableRef} className="table table-striped table-hover" style={{width: '100%'}}></table>
            )}
          </div>

          {/* Add/Edit User Modal */}
          {showModal && (
            <div className="modal fade show" style={{display: 'block', backgroundColor: 'rgba(0,0,0,0.5)'}} onClick={() => setShowModal(false)}>
              <div className="modal-dialog modal-dialog-centered modal-lg" onClick={(e) => e.stopPropagation()}>
                <div className="modal-content">
                  <div className="modal-header">
                    <h5 className="modal-title">
                      {modalMode === 'add' ? 'Add New User' : 'Edit User'}
                    </h5>
                    <button type="button" className="btn-close" onClick={() => setShowModal(false)}></button>
                  </div>
                  <div className="modal-body">
                    <div className="mb-3">
                      <label className="form-label">Username</label>
                      <input
                        type="text"
                        className="form-control"
                        value={currentUser.username}
                        onChange={(e) => setCurrentUser({...currentUser, username: e.target.value})}
                        disabled={modalMode === 'edit'}
                      />
                    </div>
                    <div className="mb-3">
                      <label className="form-label">
                        Password {modalMode === 'edit' && <small className="text-muted">(leave blank to keep current)</small>}
                      </label>
                      <input
                        type="password"
                        className="form-control"
                        value={currentUser.password}
                        onChange={(e) => setCurrentUser({...currentUser, password: e.target.value})}
                        placeholder={modalMode === 'edit' ? 'Enter new password to change' : ''}
                      />
                    </div>
                    <div className="mb-3">
                      <label className="form-label">Role</label>
                      <select
                        className="form-select"
                        value={currentUser.role}
                        onChange={(e) => setCurrentUser({...currentUser, role: e.target.value})}
                      >
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                      </select>
                    </div>
                    <div className="mb-3">
                      <label className="form-label">Access</label>
                      <select
                        className="form-select"
                        value={currentUser.access}
                        onChange={(e) => setCurrentUser({...currentUser, access: e.target.value})}
                      >
                        <option value="Allow">Allow</option>
                        <option value="Block">Block</option>
                      </select>
                    </div>
                  </div>
                  <div className="modal-footer">
                    <button type="button" className="btn btn-secondary" onClick={() => setShowModal(false)} disabled={saving}>
                      Cancel
                    </button>
                    <button type="button" className="btn btn-navy" onClick={handleSaveUser} disabled={saving}>
                      {saving ? (
                        <>
                          <span className="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                          Saving...
                        </>
                      ) : (
                        <>{modalMode === 'add' ? 'Add User' : 'Update User'}</>
                      )}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

      function ItemsView() {
        const [items, setItems] = useState([]);

        const [loading, setLoading] = useState(true);
        const [searchTerm, setSearchTerm] = useState('');
        const [searching, setSearching] = useState(false);
        
        const [showAddItemModal, setShowAddItemModal] = useState(false);
        const [showCategoryModal, setShowCategoryModal] = useState(false);
        const [editMode, setEditMode] = useState(false);
        
        const [itemForm, setItemForm] = useState({
          itemId: '',
          modelNumber: '',
          itemName: '',
          category: '',
          description: '',
          reorderLevel: 0
        });
        
        const [newCategoryName, setNewCategoryName] = useState('');
        const [categorySearchTerm, setCategorySearchTerm] = useState('');
        
        const [saving, setSaving] = useState(false);
        const tableRef = useRef(null);
        const dataTableRef = useRef(null);

        useEffect(() => {
          loadItems();
          loadCategories();
          
          return () => {
            if (dataTableRef.current) {
              try {
                dataTableRef.current.destroy();
              } catch (e) {
                // Ignore cleanup errors
              }
              dataTableRef.current = null;
            }
          };
        }, []);

        const loadItems = (skipLoading = false) => {
          if (!skipLoading) {
            setLoading(true);
          }
          
          google.script.run
            .withSuccessHandler((result) => {
              requestAnimationFrame(() => {
                if (!skipLoading) {
                  setLoading(false);
                }
                
                // Safety check for null/undefined result
                if (result && result.success) {
                  setItems(result.items || []);
                  
                  if (dataTableRef.current) {
                    try {
                      dataTableRef.current.destroy();
                    } catch (e) {
                      // Already destroyed
                    }
                    dataTableRef.current = null;
                  }
                  
                  setTimeout(() => {
                    if (tableRef.current) {
                      initDataTable(result.items || []);
                    }
                  }, 300);
                } else {
                  console.error('❌ Load items failed:', result);
                  console.error('Result object:', JSON.stringify(result));
                  alert('ERROR: ' + JSON.stringify(result));
                  showAlert('error', result ? result.message : 'Failed to load items');
                  setItems([]);
                }
              });
            })
            .withFailureHandler((error) => {
              console.error('Load items error:', error);
              if (!skipLoading) {
                setLoading(false);
              }
              showAlert('error', 'Failed to load items: ' + error.message);
              setItems([]);
            })
            .getAllItems();
        };

        const loadCategories = () => {
          google.script.run
            .withSuccessHandler((result) => {
              if (result.success) {
                setCategories(result.categories);
              }
            })
            .withFailureHandler((error) => {
              console.error('Failed to load categories:', error);
            })
            .getCategories();
        };

        const initDataTable = (data) => {
          if (!tableRef.current) {
            return;
          }

          if (dataTableRef.current) {
            try {
              dataTableRef.current.destroy();
            } catch (e) {
              console.log('DataTable destroy error:', e.message);
            }
            dataTableRef.current = null;
          }

          setTimeout(() => {
            try {
              dataTableRef.current = $(tableRef.current).DataTable({
                data: data,
                columns: [
                  { data: 'itemId', title: 'Item ID' },
                  { data: 'modelNumber', title: 'Model Number' },
                  { data: 'itemName', title: 'Item Name' },
                  { data: 'category', title: 'Category' },
                  { 
                    data: 'reorderLevel', 
                    title: 'Reorder Level',
                    render: function(data) {
                      return data || 0;
                    }
                  },
                  { 
                    data: 'reorderRequired', 
                    title: 'Reorder Required',
                    render: function(data) {
                      if (data === 'Yes') {
                        return '<span class="badge bg-danger">Yes</span>';
                      } else {
                        return '<span class="badge bg-success">No</span>';
                      }
                    }
                  },
                  {
                    data: null,
                    title: 'Actions',
                    orderable: false,
                    render: function(data, type, row) {
                      return '<button class="btn-action btn-edit" onclick="window.editItem(\'' + row.itemId + '\')" title="Edit Item"><i class="bi bi-pencil-fill"></i></button> <button class="btn-action btn-delete" onclick="window.deleteItem(\'' + row.itemId + '\')" title="Delete Item"><i class="bi bi-trash-fill"></i></button>';
                    }
                  }
                ],
                responsive: true,
                pageLength: 10,
                order: [[0, 'desc']],
                language: {
                  emptyTable: "No items found"
                },
                destroy: true,
                retrieve: false
              });
            } catch (e) {
              console.error('DataTable initialization error:', e);
            }
          }, 50);
        };

        useEffect(() => {
          window.editItem = (itemId) => {
            requestAnimationFrame(() => {
              google.script.run
                .withSuccessHandler((result) => {
                  if (result.success) {
                    setItemForm({
                      itemId: result.item.itemId,
                      modelNumber: result.item.modelNumber,
                      itemName: result.item.itemName,
                      category: result.item.category,
                      description: result.item.description,
                      reorderLevel: result.item.reorderLevel
                    });
                    setEditMode(true);
                    setTimeout(() => {
                      setShowAddItemModal(true);
                    }, 50);
                  } else {
                    showAlert('error', result.message);
                  }
                })
                .withFailureHandler((error) => {
                  showAlert('error', 'Failed to load item: ' + error.message);
                })
                .getItemById(itemId);
            });
          };

          window.deleteItem = (itemId) => {
            const item = items.find(i => i.itemId === itemId);
            const itemName = item ? item.itemName : 'this item';
            
            Swal.fire({
              title: 'Delete Item?',
              text: 'Are you sure you want to delete "' + itemName + '"? This cannot be undone.',
              icon: 'warning',
              showCancelButton: true,
              confirmButtonColor: '#001f3f',
              cancelButtonColor: '#6c757d',
              confirmButtonText: 'Yes, delete it!',
              allowOutsideClick: false
            }).then((result) => {
              if (result.isConfirmed) {
                google.script.run
                  .withSuccessHandler((result) => {
                    requestAnimationFrame(() => {
                      if (result.success) {
                        Swal.fire({
                          icon: 'success',
                          title: 'Deleted!',
                          text: result.message,
                          confirmButtonColor: '#001f3f',
                          allowOutsideClick: false
                        }).then(() => {
                          loadItems(true);
                        });
                      } else {
                        Swal.fire('Error!', result.message, 'error');
                      }
                    });
                  })
                  .withFailureHandler((error) => {
                    Swal.fire('Error!', 'Failed to delete: ' + error.message, 'error');
                  })
                  .deleteItem(itemId);
              }
            });
          };

          return () => {
            delete window.editItem;
            delete window.deleteItem;
          };
        }, [items]);

        useEffect(() => {
          if (showAddItemModal && categories.length > 0) {
            // Wait longer for modal to fully render
            setTimeout(() => {
              const $select = $('#itemCategory');
              
              if ($select.length) {
                // Destroy if already exists
                if ($select.data('select2')) {
                  $select.select2('destroy');
                }
                
                // Initialize with data
                $select.select2({
                  theme: 'bootstrap-5',
                  placeholder: 'Search or select category...',
                  allowClear: true,
                  width: '100%',
                  dropdownParent: $('.modal-content')  // ← Changed from parent() to modal-content
                }).on('change', function() {
                  const value = $(this).val();
                  setItemForm(prev => ({...prev, category: value}));
                });
              }
            }, 300);  // ← Increased timeout
          }
          
          return () => {
            const $select = $('#itemCategory');
            if ($select.data('select2')) {
              $select.select2('destroy');
            }
          };
        }, [showAddItemModal, categories]);

        const showAlert = (type, message) => {
          const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true
          });

          Toast.fire({
            icon: type,
            title: message
          });
        };

        const handleSearch = () => {
          if (searchTerm.trim() === '') {
            loadItems();
            return;
          }

          setSearching(true);
          
          google.script.run
            .withSuccessHandler((result) => {
              requestAnimationFrame(() => {
                setSearching(false);
                
                if (result.success) {
                  setItems(result.items);
                  
                if (dataTableRef.current) {
                  try {
                    dataTableRef.current.destroy();
                    dataTableRef.current = null;
                  } catch (e) {
                    // Already destroyed
                  }
                }
                setTimeout(() => initDataTable(result.items), 100);
                  
                  showAlert('info', result.items.length + ' item(s) found');
                } else {
                  showAlert('error', result.message);
                }
              });
            })
            .withFailureHandler((error) => {
              requestAnimationFrame(() => {
                setSearching(false);
                showAlert('error', 'Search failed: ' + error.message);
              });
            })
            .searchItems(searchTerm);
        };

          const handleClearSearch = () => {
            setSearchTerm('');
            if (dataTableRef.current) {
              try {
                dataTableRef.current.destroy();
                dataTableRef.current = null;
              } catch (e) {
                // Already destroyed
              }
            }
            loadItems();
          };

        const handleOpenAddModal = () => {
          setItemForm({
            itemId: '',
            modelNumber: '',
            itemName: '',
            category: '',
            description: '',
            reorderLevel: 0
          });
          setEditMode(false);
          
          // Make sure categories are loaded
          if (categories.length === 0) {
            loadCategories();  // ← Add this line if not present
          }
          
          setShowAddItemModal(true);
        };

        const handleSaveItem = () => {
          if (!itemForm.modelNumber || itemForm.modelNumber.trim() === '') {
            showAlert('warning', 'Model Number is required');
            return;
          }
          if (!itemForm.itemName || itemForm.itemName.trim() === '') {
            showAlert('warning', 'Item Name is required');
            return;
          }
          if (!itemForm.category || itemForm.category.trim() === '') {
            showAlert('warning', 'Category is required');
            return;
          }
          if (itemForm.reorderLevel === '' || itemForm.reorderLevel === null || itemForm.reorderLevel === undefined) {
            showAlert('warning', 'Reorder Level is required');
            return;
          }
          
          const reorderLevel = parseFloat(itemForm.reorderLevel);
          if (isNaN(reorderLevel) || reorderLevel < 0) {
            showAlert('warning', 'Reorder Level must be a number >= 0');
            return;
          }

          setSaving(true);
          
          if (editMode) {
            google.script.run
              .withSuccessHandler((result) => {
                requestAnimationFrame(() => {
                  setSaving(false);
                  
                  if (result.success) {
                    setShowAddItemModal(false);
                    
                    setTimeout(() => {
                      Swal.fire({
                        icon: 'success',
                        title: 'Success!',
                        text: result.message,
                        confirmButtonColor: '#001f3f',
                        allowOutsideClick: false
                      }).then(() => {
                        loadItems(true);
                      });
                    }, 200);
                  } else {
                    showAlert('error', result.message);
                  }
                });
              })
              .withFailureHandler((error) => {
                requestAnimationFrame(() => {
                  setSaving(false);
                  showAlert('error', 'Failed to update item: ' + error.message);
                });
              })
              .updateItem(itemForm.itemId, itemForm);
          } else {
            google.script.run
              .withSuccessHandler((result) => {
                requestAnimationFrame(() => {
                  setSaving(false);
                  
                  if (result.success) {
                    setShowAddItemModal(false);
                    
                    setTimeout(() => {
                      Swal.fire({
                        icon: 'success',
                        title: 'Success!',
                        text: result.message,
                        confirmButtonColor: '#001f3f',
                        allowOutsideClick: false
                      }).then(() => {
                        loadItems(true);
                      });
                    }, 200);
                  } else {
                    showAlert('error', result.message);
                  }
                });
              })
              .withFailureHandler((error) => {
                requestAnimationFrame(() => {
                  setSaving(false);
                  showAlert('error', 'Failed to add item: ' + error.message);
                });
              })
              .addItem(itemForm);
          }
        };

        const handleOpenCategoryModal = () => {
          setNewCategoryName('');
          setCategorySearchTerm('');
          setShowCategoryModal(true);
        };

        const handleAddCategory = () => {
          if (!newCategoryName || newCategoryName.trim() === '') {
            showAlert('warning', 'Please enter category name');
            return;
          }

          setSaving(true);
          
          google.script.run
            .withSuccessHandler((result) => {
              requestAnimationFrame(() => {
                setSaving(false);
                
                if (result.success) {
                  showAlert('success', result.message);
                  setNewCategoryName('');
                  
                  setTimeout(() => {
                    loadCategories();
                  }, 200);
                } else {
                  showAlert('error', result.message);
                }
              });
            })
            .withFailureHandler((error) => {
              requestAnimationFrame(() => {
                setSaving(false);
                showAlert('error', 'Failed to add category: ' + error.message);
              });
            })
            .addCategory(newCategoryName.trim());
        };

        const handleDeleteCategory = (categoryId, categoryName) => {
          Swal.fire({
            title: 'Delete Category?',
            text: 'Are you sure you want to delete "' + categoryName + '"?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#001f3f',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, delete it!',
            allowOutsideClick: false
          }).then((result) => {
            if (result.isConfirmed) {
              google.script.run
                .withSuccessHandler((result) => {
                  if (result.success) {
                    showAlert('success', result.message);
                    loadCategories();
                  } else {
                    showAlert('error', result.message);
                  }
                })
                .withFailureHandler((error) => {
                  showAlert('error', 'Failed to delete: ' + error.message);
                })
                .deleteCategory(categoryId);
            }
          });
        };

        const getFilteredCategories = () => {
          if (!categorySearchTerm || categorySearchTerm.trim() === '') {
            return categories;
          }
          const searchLower = categorySearchTerm.toLowerCase();
          return categories.filter(cat => 
            cat.categoryName.toLowerCase().includes(searchLower)
          );
        };

        return (
          <div className="list-view-container">
            <div className="list-view-header">
              <h1 className="list-view-title">
                <i className="bi bi-box-seam me-2"></i>
                Stock Items
              </h1>
              <div style={{display: 'flex', gap: '10px'}}>
                <button className="btn btn-secondary" onClick={handleOpenCategoryModal}>
                  <i className="bi bi-tag me-2"></i>
                  Add Category
                </button>
                <button className="btn btn-navy" onClick={handleOpenAddModal}>
                  <i className="bi bi-plus-circle me-2"></i>
                  Add Stock Item
                </button>
              </div>
            </div>

            <div className="data-card">
              {loading ? (
                <div className="text-center py-5">
                  <div className="spinner-border text-primary"></div>
                  <p className="mt-3">Loading items...</p>
                </div>
              ) : (
                <table ref={tableRef} className="table table-striped table-hover" style={{width: '100%'}}></table>
              )}
            </div>

            {showAddItemModal && (
              <div className="modal fade show" style={{display: 'block', backgroundColor: 'rgba(0,0,0,0.5)'}} onClick={() => setShowAddItemModal(false)}>
                <div className="modal-dialog modal-dialog-centered modal-lg" onClick={(e) => e.stopPropagation()}>
                  <div className="modal-content">
                    <div className="modal-header">
                      <h5 className="modal-title">
                        <i className="bi bi-box-seam me-2"></i>
                        {editMode ? 'Edit Stock Item' : 'Add New Stock Item'}
                      </h5>
                      <button type="button" className="btn-close" onClick={() => setShowAddItemModal(false)}></button>
                    </div>
                    <div className="modal-body">
                      {editMode && (
                        <div className="mb-3">
                          <label className="form-label">Item ID</label>
                          <input
                            type="text"
                            className="form-control"
                            value={itemForm.itemId}
                            readOnly
                            style={{backgroundColor: '#e9ecef', fontWeight: 'bold'}}
                          />
                        </div>
                      )}
                      
                      <div className="row">
                        <div className="col-md-6 mb-3">
                          <label className="form-label">Model Number *</label>
                          <input
                            type="text"
                            className="form-control"
                            value={itemForm.modelNumber}
                            onChange={(e) => setItemForm({...itemForm, modelNumber: e.target.value})}
                            placeholder="e.g., CPU-I5-12400"
                          />
                        </div>
                        
                        <div className="col-md-6 mb-3">
                          <label className="form-label">Item Name *</label>
                          <input
                            type="text"
                            className="form-control"
                            value={itemForm.itemName}
                            onChange={(e) => setItemForm({...itemForm, itemName: e.target.value})}
                            placeholder="e.g., Intel Core i5-12400"
                          />
                        </div>
                      </div>
                      
                      <div className="row">
                        <div className="col-md-6 mb-3">
                          <label className="form-label">Category *</label>
                          <select
                            id="itemCategory"
                            className="form-control select2-category"
                            value={itemForm.category}
                            onChange={(e) => setItemForm({...itemForm, category: e.target.value})}
                          >
                            <option value="">Select category...</option>
                            {categories.map((category) => (
                              <option key={category.categoryId || category.name} value={category.categoryName || category.name}>
                                {category.categoryName || category.name}
                              </option>
                            ))}
                          </select>
                          {categories.length === 0 && (
                            <small className="text-muted">
                              <i className="bi bi-info-circle me-1"></i>
                              No categories available. Click "Add Category" button to add one.
                            </small>
                          )}
                        </div>
                        
                        <div className="col-md-6 mb-3">
                          <label className="form-label">Reorder Level *</label>
                          <input
                            type="number"
                            className="form-control"
                            value={itemForm.reorderLevel}
                            onChange={(e) => setItemForm({...itemForm, reorderLevel: e.target.value})}
                            min="0"
                            placeholder="e.g., 50"
                          />
                          <small className="text-muted">Alert when stock falls below this level</small>
                        </div>
                      </div>
                      
                      <div className="mb-3">
                        <label className="form-label">Description (Optional)</label>
                        <textarea
                          className="form-control"
                          value={itemForm.description}
                          onChange={(e) => setItemForm({...itemForm, description: e.target.value})}
                          rows="3"
                          placeholder="Enter item description..."
                        ></textarea>
                      </div>
                      
                      <div className="alert alert-info mb-0">
                        <i className="bi bi-info-circle me-2"></i>
                        <strong>Note:</strong> Stock QTY will be automatically calculated from purchases. Reorder Required status updates automatically when stock falls below reorder level.
                      </div>
                    </div>
                    <div className="modal-footer">
                      <button className="btn btn-secondary" onClick={() => setShowAddItemModal(false)} disabled={saving}>
                        Cancel
                      </button>
                      <button className="btn btn-navy" onClick={handleSaveItem} disabled={saving}>
                        {saving ? (
                          <><span className="spinner-border spinner-border-sm me-2"></span>Saving...</>
                        ) : (
                          <><i className="bi bi-check-circle me-2"></i>{editMode ? 'Update Item' : 'Add Item'}</>
                        )}
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {showCategoryModal && (
              <div className="modal fade show" style={{display: 'block', backgroundColor: 'rgba(0,0,0,0.5)'}} onClick={() => setShowCategoryModal(false)}>
                <div className="modal-dialog modal-dialog-centered modal-lg" onClick={(e) => e.stopPropagation()}>
                  <div className="modal-content">
                    <div className="modal-header">
                      <h5 className="modal-title">
                        <i className="bi bi-tag me-2"></i>
                        Manage Categories
                      </h5>
                      <button type="button" className="btn-close" onClick={() => setShowCategoryModal(false)}></button>
                    </div>
                    <div className="modal-body">
                      <div style={{backgroundColor: '#f8f9fa', padding: '15px', borderRadius: '8px', marginBottom: '20px'}}>
                        <h6 style={{marginBottom: '10px', color: '#001f3f'}}>Add New Category</h6>
                        <div style={{display: 'flex', gap: '10px'}}>
                          <input
                            type="text"
                            className="form-control"
                            placeholder="Enter category name..."
                            value={newCategoryName}
                            onChange={(e) => setNewCategoryName(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && handleAddCategory()}
                          />
                          <button 
                            className="btn btn-navy" 
                            onClick={handleAddCategory}
                            disabled={saving}
                            style={{whiteSpace: 'nowrap'}}
                          >
                            {saving ? (
                              <span className="spinner-border spinner-border-sm"></span>
                            ) : (
                              <><i className="bi bi-plus-circle me-1"></i>Add</>
                            )}
                          </button>
                        </div>
                      </div>

                      <div className="mb-3">
                        <input
                          type="text"
                          className="form-control"
                          placeholder="Search categories..."
                          value={categorySearchTerm}
                          onChange={(e) => setCategorySearchTerm(e.target.value)}
                        />
                      </div>

                      <div style={{maxHeight: '400px', overflowY: 'auto'}}>
                        {getFilteredCategories().length === 0 ? (
                          <div className="alert alert-info">
                            <i className="bi bi-info-circle me-2"></i>
                            {categorySearchTerm ? 'No categories found matching your search.' : 'No categories yet. Add one above!'}
                          </div>
                        ) : (
                          <table className="table table-hover">
                            <thead style={{position: 'sticky', top: 0, backgroundColor: '#fff', zIndex: 1}}>
                              <tr>
                                <th>Category Name</th>
                                <th>Created Date</th>
                                <th style={{width: '80px'}}>Action</th>
                              </tr>
                            </thead>
                            <tbody>
                              {getFilteredCategories().map((category) => (
                                <tr key={category.categoryId}>
                                  <td>
                                    <i className="bi bi-tag-fill me-2" style={{color: '#001f3f'}}></i>
                                    <strong>{category.categoryName || category.name || category.Category}</strong>
                                  </td>
                                  <td>
                                    <small className="text-muted">
                                      {category.createdDate || category.dateCreated || category.Date || '-'}
                                    </small>
                                  </td>
                                  <td>
                                    <button
                                      className="btn btn-sm btn-danger"
                                      onClick={() => handleDeleteCategory(category.categoryId || category.name, category.categoryName || category.name)}
                                      title="Delete category"
                                    >
                                      <i className="bi bi-trash"></i>
                                    </button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        )}
                      </div>

                      <div style={{marginTop: '15px', padding: '10px', backgroundColor: '#f8f9fa', borderRadius: '8px', textAlign: 'center'}}>
                        <small className="text-muted">
                          <i className="bi bi-info-circle me-1"></i>
                          Total Categories: <strong>{categories.length}</strong>
                          {categorySearchTerm && ' | Showing: ' + getFilteredCategories().length}
                        </small>
                      </div>
                    </div>
                    <div className="modal-footer">
                      <button className="btn btn-secondary" onClick={() => setShowCategoryModal(false)}>
                        Close
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

function InventoryView() {
  const [inventory, setInventory] = useState([]);
  const [loading, setLoading] = useState(true);
  const [searchTerm, setSearchTerm] = useState('');
  const [searching, setSearching] = useState(false);
  const [showDetailsModal, setShowDetailsModal] = useState(false);
  const [currentItem, setCurrentItem] = useState(null);
  const [itemDetails, setItemDetails] = useState(null);
  const [lowStockCount, setLowStockCount] = useState(0);
  
  const tableRef = useRef(null);
  const dataTableRef = useRef(null);

  useEffect(() => {
    loadInventory();
    
    return () => {
      if (dataTableRef.current) {
        try {
          dataTableRef.current.destroy();
        } catch (e) {
          // Ignore
        }
        dataTableRef.current = null;
      }
    };
  }, []);

  const loadInventory = (skipLoading = false) => {
    if (!skipLoading) {
      setLoading(true);
    }
    
    google.script.run
      .withSuccessHandler((result) => {
        requestAnimationFrame(() => {
          if (!skipLoading) {
            setLoading(false);
          }
          
          // Safety check for null/undefined result
          if (result && result.success) {
            setInventory(result.inventory || []);
            
            // Count low stock items
            const inventory = result.inventory || [];
            const lowStock = inventory.filter(item => item.reorderRequired === 'Yes').length;
            setLowStockCount(lowStock);
            
            if (dataTableRef.current) {
              try {
                dataTableRef.current.destroy();
              } catch (e) {
                // Already destroyed
              }
              dataTableRef.current = null;
            }
            
            setTimeout(() => {
              if (tableRef.current) {
                initDataTable(inventory);
              }
            }, 300);
          } else {
            console.error('❌ Load inventory failed:', result);
            console.error('Result object:', JSON.stringify(result));
            alert('INVENTORY ERROR: ' + JSON.stringify(result));
            showAlert('error', result ? result.message : 'Failed to load inventory');
            setInventory([]);
          }
        });
      })
      .withFailureHandler((error) => {
        console.error('Load inventory error:', error);
        if (!skipLoading) {
          setLoading(false);
        }
        showAlert('error', 'Failed to load inventory: ' + error.message);
        setInventory([]);
      })
      .getInventorySummary();
  };

  const initDataTable = (data) => {
    if (!tableRef.current) {
      return;
    }

    if (dataTableRef.current) {
      try {
        dataTableRef.current.destroy();
      } catch (e) {
        console.log('DataTable destroy error:', e.message);
      }
      dataTableRef.current = null;
    }

    setTimeout(() => {
      try {
        dataTableRef.current = $(tableRef.current).DataTable({
          data: data,

// Supplier Autocomplete Input Component
    function SupplierAutocompleteInput({ value, onChange, suppliers, onSelect, placeholder }) {
      const [showDropdown, setShowDropdown] = useState(false);
      const [filteredSuppliers, setFilteredSuppliers] = useState([]);
      const wrapperRef = useRef(null);

      useEffect(() => {
        function handleClickOutside(event) {
          if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
            setShowDropdown(false);
          }
        }
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleInputChange = (e) => {
        const inputValue = e.target.value;
        onChange(inputValue);

        if (inputValue.length > 0) {
          const filtered = suppliers.filter(supplier =>
            supplier.name.toLowerCase().includes(inputValue.toLowerCase()) ||
            (supplier.companyName && supplier.companyName.toLowerCase().includes(inputValue.toLowerCase())) ||
            (supplier.id && supplier.id.toLowerCase().includes(inputValue.toLowerCase()))
          );
          setFilteredSuppliers(filtered);
          setShowDropdown(filtered.length > 0);
        } else {
          setShowDropdown(false);
        }
      };

      const handleSelectSupplier = (supplier) => {
        onSelect(supplier);
        setShowDropdown(false);
      };

      return (
        <div className="autocomplete-wrapper" ref={wrapperRef}>
          <input
            type="text"
            className="form-control"
            value={value}
            onChange={handleInputChange}
            placeholder={placeholder}
            autoComplete="off"
          />
          {showDropdown && (
            <div className="autocomplete-dropdown">
              {filteredSuppliers.map((supplier, index) => (
                <div
                  key={index}
                  className="autocomplete-item"
                  onClick={() => handleSelectSupplier(supplier)}
                >
                  <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                    <div>
                      <strong>{supplier.name}</strong> - {supplier.companyName}
                    </div>
                    <span className="badge bg-info" style={{fontSize: '10px'}}>
                      {supplier.id}
                    </span>
                  </div>
                  {supplier.phone && (
                    <div style={{fontSize: '11px', color: '#6c757d'}}>
                      📞 {supplier.phone} | 📧 {supplier.email}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

                              value={item.totalTax.toFixed(2)}
                              readOnly
                              style={{backgroundColor: '#e9ecef'}}
                            />
                          </td>
                          <td>
                            <input
                              type="text"
                              className="form-control form-control-sm"
                              value={item.costInclTax.toFixed(2)}
                              readOnly
                              style={{backgroundColor: '#e9ecef'}}
                            />
                          </td>
                          <td>
                            <input
                              type="text"
                              className="form-control form-control-sm"
                              value={item.totalPrice.toFixed(2)}
                              readOnly
                              style={{backgroundColor: '#e9ecef', fontWeight: 'bold'}}
                            />
                          </td>
                          <td className="text-center">
                            <button
                              className="btn btn-danger btn-sm"
                              onClick={() => removePOItem(index)}
                              title="Remove item"
                            >
                              ×
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>

            {/* Total Summary */}
            {poForm.items.length > 0 && (
              <div style={{textAlign: 'right', marginTop: '20px', padding: '15px', backgroundColor: '#f8f9fa', borderRadius: '8px'}}>
                <h5 style={{color: '#001f3f'}}>
                  Grand Total: $ {poForm.items.reduce((sum, item) => sum + item.totalPrice, 0).toFixed(2)}
                </h5>
              </div>
            )}
          </div>
          
          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={() => setShowCreatePOModal(false)} disabled={saving}>
              Close
            </button>
            <button className="btn btn-navy" onClick={handleSavePO} disabled={saving}>
              {saving ? (
                <>
                  <span className="spinner-border spinner-border-sm me-2"></span>
                  Saving...
                </>
              ) : (
                <>
                  <i className="bi bi-save me-2"></i>
                  Save PO
                </>
              )}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

    function QuoteApp({ currentUser, userRole, onLogout }) {
      const [items, setItems] = useState([]); // Changed from stocks

    // Stocks View Component -- FunStocks
    function StocksView() {
      const [stocks, setStocks] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [showModal, setShowModal] = useState(false);
      const [modalMode, setModalMode] = useState('add');
      const [currentStock, setCurrentStock] = useState({
        itemName: '',
        purchasePrice: 0,
        salePrice: 0,
        quantity: 0,
        description: ''
      });
      const [originalItemName, setOriginalItemName] = useState('');
      const [alert, setAlert] = useState({ show: false, type: '', message: '' });
      const tableRef = useRef(null);
      const dataTableRef = useRef(null);

      useEffect(() => {
        loadStocks();
      }, []);

      const loadStocks = (refresh = false) => {
        if (!refresh) {
          setLoading(true);
        }

        google.script.run
          .withSuccessHandler((result) => {
            if (result && result.success) {
              setStocks(result.stocks);

              if (refresh && dataTableRef.current) {
                // Update existing table without destroying it
                dataTableRef.current.clear();
                dataTableRef.current.rows.add(result.stocks);
                dataTableRef.current.draw();
              } else {
                setLoading(false);
                setTimeout(() => initDataTable(result.stocks), 100);
              }
            } else {
              showAlert('danger', result.message);
              setLoading(false);
            }
          })
          .withFailureHandler((error) => {
            showAlert('danger', 'Failed to load stocks: ' + error.message);
            setLoading(false);
          })
          .getStocks();
      };

      const initDataTable = (data) => {
        if (dataTableRef.current) {
          dataTableRef.current.destroy();
        }

        dataTableRef.current = $(tableRef.current).DataTable({
          data: data,
          deferRender: true,
          processing: true,
          autoWidth: false,
          stateSave: false,
          columns: [
            { data: 'itemName', title: 'Item Name' },
            {
              data: 'purchasePrice',
              title: 'Purchase Price',
              render: function(data) {
                return '$' + parseFloat(data).toFixed(2);
              }
            },
            {
              data: 'salePrice',
              title: 'Sale Price',
              render: function(data) {
                return '$' + parseFloat(data).toFixed(2);
              }
            },
            {
              data: 'quantity',
              title: 'Stock Qty',
              render: function(data) {
                const qty = parseInt(data) || 0;
                const badgeClass = qty > 50 ? 'bg-success' : qty > 20 ? 'bg-warning' : 'bg-danger';
                return `<span class="badge ${badgeClass}">${qty}</span>`;
              }
            },
            { data: 'description', title: 'Description' },
            {
              data: null,
              title: 'Actions',
              orderable: false,
              render: function(data, type, row) {
                return `
                  <button class="btn-action btn-edit" onclick="window.editStock('${row.itemName}')" title="Edit Stock">
                    <i class="bi bi-pencil-fill"></i>
                  </button>
                  <button class="btn-action btn-delete" onclick="window.deleteStock('${row.itemName}')" title="Delete Stock">
                    <i class="bi bi-trash-fill"></i>
                  </button>
                `;
              }
            }
          ],
          responsive: true,
          pageLength: 10,
          order: [[0, 'asc']],
          language: {
            emptyTable: "No stock items found"
          }
        });
      };

      useEffect(() => {
        window.editStock = (itemName) => {
          const stock = stocks.find(s => s.itemName === itemName);
          if (stock) {
            setCurrentStock({
              itemName: stock.itemName || '',
              purchasePrice: parseFloat(stock.purchasePrice) || 0,
              salePrice: parseFloat(stock.salePrice) || 0,
              description: stock.description || ''
            });
            setOriginalItemName(itemName);
            setModalMode('edit');
            setShowModal(true);
          }
        };

        window.deleteStock = (itemName) => {
          Swal.fire({
            title: 'Are you sure?',
            text: "You won't be able to revert this!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#001f3f',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, delete it!'
          }).then((result) => {
            if (result.isConfirmed) {
              setDeleting(true);
              google.script.run
                .withSuccessHandler((result) => {
                  setDeleting(false);
                  if (result && result.success) {
                    Swal.fire('Deleted!', 'Stock item has been deleted.', 'success');
                    loadStocks(true); // Refresh without blank page
                  } else {
                    Swal.fire('Error!', result.message, 'error');
                  }
                })
                .withFailureHandler((error) => {
                  setDeleting(false);
                  Swal.fire('Error!', 'Failed to delete stock: ' + error.message, 'error');
                })
                .deleteStock(itemName);
            }
          });
        };

        return () => {
          delete window.editStock;
          delete window.deleteStock;
        };
      }, [stocks]);

      const showAlert = (type, message) => {
        const Toast = Swal.mixin({
          toast: true,
          position: 'top-end',
          showConfirmButton: false,
          timer: 3000,
          timerProgressBar: true,
          didOpen: (toast) => {
            toast.addEventListener('mouseenter', Swal.stopTimer)
            toast.addEventListener('mouseleave', Swal.resumeTimer)
          }
        });

        const iconType = type === 'success' ? 'success' :
                        type === 'danger' ? 'error' :
                        type === 'warning' ? 'warning' : 'info';

        Toast.fire({
          icon: iconType,
          title: message
        });
      };

      const handleAddNew = () => {
        setCurrentStock({
          itemName: '',
          purchasePrice: 0,
          salePrice: 0,
          quantity: 0,
          description: ''
        });
        setOriginalItemName('');
        setModalMode('add');
        setShowModal(true);
      };

      const handleSaveStock = () => {
        if (!currentStock.itemName) {
          showAlert('warning', 'Please enter item name');
          return;
        }

        if (!currentStock.purchasePrice || parseFloat(currentStock.purchasePrice) < 0) {
          showAlert('warning', 'Please enter a valid purchase price');
          return;
        }

        if (!currentStock.salePrice || parseFloat(currentStock.salePrice) < 0) {
          showAlert('warning', 'Please enter a valid sale price');
          return;
        }

        setSaving(true);

        if (modalMode === 'add') {
          google.script.run
            .withSuccessHandler((result) => {
              setSaving(false);
              if (result && result.success) {
                showAlert('success', 'Stock item added successfully');
                setShowModal(false);
                loadStocks(true);
              } else {
                showAlert('danger', result.message);
              }
            })
            .withFailureHandler((error) => {
              setSaving(false);
              showAlert('danger', 'Failed to add stock: ' + error.message);
            })
            .addStock(currentStock);
        } else {
          google.script.run
            .withSuccessHandler((result) => {
              setSaving(false);
              if (result && result.success) {
                showAlert('success', 'Stock item updated successfully');
                setShowModal(false);
                loadStocks(true);
              } else {
                showAlert('danger', result.message);
              }
            })
            .withFailureHandler((error) => {
              setSaving(false);
              showAlert('danger', 'Failed to update stock: ' + error.message);
            })
            .updateStock(originalItemName, currentStock);
        }
      };

      return (
        <div className="list-view-container">
          {alert.show && (
            <div className={`alert alert-${alert.type} alert-dismissible fade show`} role="alert">
              {alert.message}
              <button type="button" className="btn-close" onClick={() => setAlert({ show: false })}></button>
            </div>
          )}

          <div className="list-view-header">
            <h1 className="list-view-title">
              <i className="bi bi-box-seam me-2"></i>
              Stock Management
            </h1>
            <button className="btn btn-navy" onClick={handleAddNew}>
              <i className="bi bi-plus-circle me-2"></i>
              Add New Stock Item
            </button>
          </div>

          {/* Statistics Cards */}
          {!loading && (
            <div className="dashboard-stats" style={{marginBottom: '2rem'}}>
              <div className="stat-card">
                <div className="stat-card-header">
                  <div>
                    <div className="stat-card-title">Total Stock Items</div>
                    <div className="stat-card-value">{stocks.length}</div>
                  </div>
                  <div className="stat-card-icon">
                    <i className="bi bi-box-seam"></i>
                  </div>
                </div>
                <div className="stat-card-change positive">
                  <i className="bi bi-arrow-up"></i> Active Items
                </div>
              </div>

              <div className="stat-card">
                <div className="stat-card-header">
                  <div>
                    <div className="stat-card-title">Total Stock Value</div>
                    <div className="stat-card-value">${stocks.reduce((sum, s) => sum + ((parseFloat(s.salePrice) || 0) * (parseInt(s.quantity) || 0)), 0).toFixed(2)}</div>
                  </div>
                  <div className="stat-card-icon">
                    <i className="bi bi-currency-dollar"></i>
                  </div>
                </div>
                <div className="stat-card-change positive">
                  <i className="bi bi-graph-up"></i> At Sale Price
                </div>
              </div>

              <div className="stat-card">
                <div className="stat-card-header">
                  <div>
                    <div className="stat-card-title">Low Stock Items</div>
                    <div className="stat-card-value">{stocks.filter(s => {
                      const qty = parseInt(s.quantity) || 0;
                      return qty > 0 && qty <= 20;
                    }).length}</div>
                  </div>
                  <div className="stat-card-icon">
                    <i className="bi bi-exclamation-triangle-fill"></i>
                  </div>
                </div>
                <div className="stat-card-change" style={{color: '#ffc107'}}>
                  <i className="bi bi-arrow-down"></i> Need Restock
                </div>
              </div>

              <div className="stat-card">
                <div className="stat-card-header">
                  <div>
                    <div className="stat-card-title">Out of Stock</div>
                    <div className="stat-card-value">{stocks.filter(s => (parseInt(s.quantity) || 0) === 0).length}</div>
                  </div>
                  <div className="stat-card-icon">
                    <i className="bi bi-x-circle-fill"></i>
                  </div>
                </div>
                <div className="stat-card-change" style={{color: '#dc3545'}}>
                  <i className="bi bi-exclamation-circle"></i> Urgent
                </div>
              </div>
            </div>
          )}

          <div className="data-card">
            {loading ? (
              <div className="text-center py-5">
                <div className="spinner-border text-primary" role="status">
                  <span className="visually-hidden">Loading...</span>
                </div>
              </div>
            ) : (
              <table ref={tableRef} className="table table-striped table-hover" style={{width: '100%'}}></table>
            )}
          </div>

          {/* Stock Modal */}
          {showModal && (
            <div className="modal fade show" style={{display: 'block', backgroundColor: 'rgba(0,0,0,0.5)'}} onClick={() => setShowModal(false)}>
              <div className="modal-dialog modal-dialog-centered modal-lg" onClick={(e) => e.stopPropagation()}>
                <div className="modal-content">
                  <div className="modal-header">
                    <h5 className="modal-title">
                      <i className="bi bi-box-seam me-2"></i>
                      {modalMode === 'add' ? 'Add New Stock Item' : 'Edit Stock Item'}
                    </h5>
                    <button type="button" className="btn-close" onClick={() => setShowModal(false)}></button>
                  </div>
                  <div className="modal-body customer-form">
                    <div className="row">
                      <div className="col-md-12 mb-3">
                        <label className="form-label">Item Name *</label>
                        <input
                          type="text"
                          className="form-control"
                          value={currentStock.itemName}
                          onChange={(e) => setCurrentStock({...currentStock, itemName: e.target.value})}
                          placeholder="Enter item name"
                          disabled={modalMode === 'edit'}
                          style={modalMode === 'edit' ? {backgroundColor: '#e9ecef'} : {}}
                        />
                        {modalMode === 'edit' && (
                          <small className="text-muted">Item name cannot be changed when editing</small>
                        )}
                      </div>
                    </div>
                    <div className="row">
                      <div className="col-md-6 mb-3">
                        <label className="form-label">Purchase Price *</label>
                        <div className="input-group">
                          <span className="input-group-text">$</span>
                          <input
                            type="number"
                            className="form-control"
                            value={currentStock.purchasePrice}
                            onChange={(e) => setCurrentStock({...currentStock, purchasePrice: e.target.value})}
                            placeholder="0.00"
                            step="0.01"
                            min="0"
                          />
                        </div>
                      </div>
                      <div className="col-md-6 mb-3">
                        <label className="form-label">Sale Price *</label>
                        <div className="input-group">
                          <span className="input-group-text">$</span>
                          <input
                            type="number"
                            className="form-control"
                            value={currentStock.salePrice}
                            onChange={(e) => setCurrentStock({...currentStock, salePrice: e.target.value})}
                            placeholder="0.00"
                            step="0.01"
                            min="0"
                          />

                          min="0"

                      </div>

                    <div className="row">

                        <>
                          <span className="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                          Saving...
                        </>
                      ) : (
                        <>
                          <i className="bi bi-save me-2"></i>
                          {modalMode === 'add' ? 'Add Stock Item' : 'Save Changes'}
                        </>
                      )}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

      const pieChartInstance = useRef(null);
      const donutChartInstance = useRef(null);

      useEffect(() => {

          // Cleanup charts on unmount

          if (donutChartInstance.current) donutChartInstance.current.destroy();
          if (barChartInstance.current) barChartInstance.current.destroy();

      const loadDashboardData = () => {
        setLoading(true);

        google.script.run
          .withSuccessHandler((result) => {

              setStocks(result.stocks);
              checkDataLoaded();
            }
          })
          .withFailureHandler((error) => {
            console.error('Failed to load stocks:', error);
            checkDataLoaded();
          })

        // Load quotes
        google.script.run
          .withSuccessHandler((result) => {
            if (result && result.success) {
              setQuotes(result.quotes);
              checkDataLoaded();
            }
          })
          .withFailureHandler((error) => {
            console.error('Failed to load quotes:', error);
            checkDataLoaded();
          })
          .getQuotes();

        // Load customers
        google.script.run
          .withSuccessHandler((result) => {
            if (result && result.success) {
              setCustomers(result.customers);
              checkDataLoaded();

    // All Invoices View Component -- Fun Invoice
    function AllInvoicesView({ hasPermission, currentUser }) {
      const [allInvoices, setAllInvoices] = useState([]);
      const [filteredInvoices, setFilteredInvoices] = useState([]);
      const [loading, setLoading] = useState(true);
      const [fromDate, setFromDate] = useState('');
      const [toDate, setToDate] = useState('');
      const tableRef = useRef(null);
      const dataTableRef = useRef(null);
      
      // Manual Invoice Modal States
      const [showManualInvoiceModal, setShowManualInvoiceModal] = useState(false);
      const [customers, setCustomers] = useState([]);
      const [items, setItems] = useState([]);
      const [savingManualInvoice, setSavingManualInvoice] = useState(false);
      const [manualInvoice, setManualInvoice] = useState({
        date: new Date().toISOString().slice(0, 10),
        customerId: '',
        objective: '',
        materialCost: 0,
        installationCost: 0,
        salesTax: 0,
        downPayment: 0,
        taxType: 'Percentage',  // ADD THIS
        taxRate: 0,             // ADD THIS
        terms: 'Payment due within 30 days',
        preparedBy: 'admin'
      });
      const [selectedCustomer, setSelectedCustomer] = useState(null);
      const [customerIdInput, setCustomerIdInput] = useState('');
      const [lineItems, setLineItems] = useState([
        { itemNumber: 1, modelNumber: '', itemName: '', category: '', qty: 1, lockedField: '' }
      ]);
      
      // Invoice Action Panel
      const [invoiceActionPanelOpen, setInvoiceActionPanelOpen] = useState(false);
      const [selectedInvoiceForActions, setSelectedInvoiceForActions] = useState(null);
      
      // View Invoice Modal States
      const [showViewInvoiceModal, setShowViewInvoiceModal] = useState(false);
      const [viewingInvoice, setViewingInvoice] = useState(null);
      const [loadingInvoiceDetails, setLoadingInvoiceDetails] = useState(false);
      
      // Mobile States
      const [isMobile, setIsMobile] = useState(() => {
        const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const isNarrow = window.innerWidth <= 1200;
        const ua = navigator.userAgent.toLowerCase();
        const isMobileUA = /mobile|android|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(ua);
        return hasTouch || isNarrow || isMobileUA;
      });
      const [mobileFilterExpanded, setMobileFilterExpanded] = useState(false);
      const [mobileSearchTerm, setMobileSearchTerm] = useState('');
      const [showMobileInvoiceModal, setShowMobileInvoiceModal] = useState(false);
      const [selectedMobileInvoice, setSelectedMobileInvoice] = useState(null);
      const [showMobileInvoiceDetails, setShowMobileInvoiceDetails] = useState(false);
      const [mobileInvoiceToView, setMobileInvoiceToView] = useState(null);

      useEffect(() => {
        loadInvoices();
      }, []);

      // ADD THIS NEW useEffect:
      useEffect(() => {
        const subTotal = parseFloat(manualInvoice.materialCost) + parseFloat(manualInvoice.installationCost);
        if (manualInvoice.taxType === 'Exempt') {
          setManualInvoice(prev => ({...prev, salesTax: 0}));
        } else {
          const calculatedTax = subTotal * (parseFloat(manualInvoice.taxRate) / 100);
          setManualInvoice(prev => ({...prev, salesTax: calculatedTax}));
        }
      }, [manualInvoice.materialCost, manualInvoice.installationCost, manualInvoice.taxType, manualInvoice.taxRate]);

      useEffect(() => {
        filterInvoices();
      }, [allInvoices, fromDate, toDate]);

      const filterInvoices = () => {
        let filtered = [...allInvoices];

        if (fromDate) {
          const from = new Date(fromDate);
          filtered = filtered.filter(inv => new Date(inv.date) >= from);
        }

        if (toDate) {
          const to = new Date(toDate);
          to.setHours(23, 59, 59, 999);
          filtered = filtered.filter(inv => new Date(inv.date) <= to);
        }

        setFilteredInvoices(filtered);

        // Update DataTable if it exists
        if (dataTableRef.current) {
          try {
            dataTableRef.current.clear();
            dataTableRef.current.rows.add(filtered);
            dataTableRef.current.draw();
          } catch (e) {
            console.log('DataTable update error:', e);
          }
        }
      };


        const loadInvoices = (skipLoading = false) => {
          if (!skipLoading) setLoading(true);

          google.script.run
            .withSuccessHandler((result) => {
              setLoading(false);
              if (result && result.success) {
                setAllInvoices(result.invoices || []);
                setTimeout(() => initializeDataTable(result.invoices || []), 100);
              }
            })
            .withFailureHandler((error) => {
              setLoading(false);
              showAlert('danger', 'Failed to load: ' + error.message);
            })
            .getInvoices();
        };

      const showAlert = (type, message) => {
        const Toast = Swal.mixin({
          toast: true,
          position: 'top-end',
          showConfirmButton: false,
          timer: 3000,
          timerProgressBar: true,
        });

        const iconType = type === 'success' ? 'success' :
                        type === 'danger' ? 'error' :
                        type === 'warning' ? 'warning' : 'info';

        Toast.fire({
          icon: iconType,
          title: message
        });
      };

      const initializeDataTable = (data) => {
        if (dataTableRef.current) {
          try {
            dataTableRef.current.destroy();
          } catch (e) {
            console.log('DataTable destroy error:', e);
          }
        }

          // Clear the table HTML
          if (tableRef.current) {
            $(tableRef.current).empty();
          }
          
        setTimeout(() => {
          dataTableRef.current = $(tableRef.current).DataTable({
            data: data,
            deferRender: true,
            processing: true,
            autoWidth: false,
            stateSave: false,
            columns: [
              { data: 'invoiceNumber', title: 'Invoice #' },
              {
                data: 'date',
                title: 'Date',
                render: function(data) {
                  return new Date(data).toLocaleDateString();
                }
              },
              {
                data: 'dueDate',
                title: 'Due Date',
                render: function(data) {
                  return new Date(data).toLocaleDateString();
                }
              },
              { data: 'customerName', title: 'Customer' },
              {
                data: 'grandTotal',
                title: 'Total',
                render: function(data) {
                  return '$' + parseFloat(data || 0).toFixed(2);
                }
              },
              {
                data: 'status',
                title: 'Status',
                render: function(data) {
                  const badgeClass = data === 'Paid' ? 'bg-success' : 'bg-warning';
                  return `<span class="badge ${badgeClass}">${data}</span>`;
                }
              },
              {
                data: 'quoteNumber',

        const grandTotal = subTotal + salesTax;
        const downPayment = parseFloat(manualInvoice.downPayment) || 0;
        const finalPayment = grandTotal - downPayment;
        
        return { subTotal, grandTotal, finalPayment };

      // Suppliers View Component - COMPLETELY FIXED VERSION -- Fun Supplier
      function SuppliersView({ hasPermission, currentUser }) {
        const [suppliers, setSuppliers] = useState([]);
        const [loading, setLoading] = useState(true);
        const [showModal, setShowModal] = useState(false);
        const [showViewModal, setShowViewModal] = useState(false);  // NEW: View modal
        const [viewingSupplier, setViewingSupplier] = useState(null);  // NEW: Current supplier being viewed
        const [editMode, setEditMode] = useState(false);
        const [formData, setFormData] = useState({
          id: '',
          name: '',
          companyName: '',
          contactPerson: '',
          phone: '',
          email: '',
          address: '',
          city: '',
          country: ''
        });
        const [saving, setSaving] = useState(false);
        const tableRef = useRef(null);

        useEffect(() => {
          loadSuppliers();
        }, []);

        useEffect(() => {
          if (suppliers.length >= 0 && !loading) {
            setTimeout(() => {
              initializeDataTable();
            }, 100);
          }
        }, [suppliers, loading]);

        const loadSuppliers = () => {
          setLoading(true);
          google.script.run
            .withSuccessHandler((result) => {
              if (result && result.success) {
                setSuppliers(result.suppliers);
                setLoading(false);
              } else {
                alert('Error loading suppliers');
                setLoading(false);
              }
            })
            .withFailureHandler((error) => {
              alert('Error: ' + error.message);
              setLoading(false);
            })
            .getSuppliers();
        };

        const initializeDataTable = () => {
          if (!tableRef.current) return;
          
          if ($.fn.DataTable.isDataTable(tableRef.current)) {
            $(tableRef.current).DataTable().destroy();
          }

          $(tableRef.current).empty();

          $(tableRef.current).DataTable({
            data: suppliers,
            deferRender: true,
            processing: true,
            autoWidth: false,
            stateSave: false,
            columns: [
              {
                title: 'Supplier ID',
                data: 'id',
                render: function(data) {
                  return '<span class="badge bg-info">' + data + '</span>';
                }
              },
              { title: 'Name', data: 'name' },
              { title: 'Company', data: 'companyName' },
              { title: 'Contact', data: 'contactPerson' },
              { title: 'Phone', data: 'phone' },
              { title: 'Email', data: 'email' },
              {
                title: 'Actions',
                data: null,
                orderable: false,
                render: function(data, type, row) {
                  const canView = !hasPermission || hasPermission('suppliers', 'view-supplier');
                  const canEdit = !hasPermission || hasPermission('suppliers', 'edit-supplier');
                  const canDelete = !hasPermission || hasPermission('suppliers', 'delete-supplier');
                  
                  
                  let buttons = '';
                  if (canView) {
                    buttons += '<button class="btn-action btn-view" onclick="viewSupplier(\'' + row.id + '\')" title="View Details"><i class="bi bi-eye-fill"></i></button>';
                  }
                  if (canEdit) {
                    buttons += '<button class="btn-action btn-edit" onclick="editSupplier(\'' + row.id + '\')" title="Edit"><i class="bi bi-pencil"></i></button>';
                  }
                  if (canDelete) {
                    buttons += '<button class="btn-action btn-delete" onclick="deleteSupplier(\'' + row.id + '\')" title="Delete"><i class="bi bi-trash"></i></button>';
                  }
                  return buttons;
                }
              } 
/*
            {
                  title: 'Purchases',
                  data: 'purchaseCount',
                  render: function(data) {
                    return '<span class="badge bg-success">' + (data || 0) + '</span>';
                  }
                },
                {
                title: 'Total Spent',
                  data: 'totalPurchaseValue',
                  render: function(data) {
                    return '$' + parseFloat(data || 0).toFixed(2);
                  }
                }, 
*/
            ],
            destroy: true,
            responsive: true,
            order: [[0, 'desc']],
            pageLength: 10
          });
        };

        window.editSupplier = function(supplierId) {
          const supplier = suppliers.find(s => s.id === supplierId);
          if (supplier) {
            setFormData({
              id: supplier.id,
              name: supplier.name,
              companyName: supplier.companyName || '',
              contactPerson: supplier.contactPerson || '',
              phone: supplier.phone || '',
              email: supplier.email || '',
              address: supplier.address || '',
              city: supplier.city || '',
              country: supplier.country || ''
            });
            setEditMode(true);
            setShowModal(true);
          }
        };

        // NEW: View Supplier with Purchase History
        window.viewSupplier = function(supplierId) {
          // Show loading state
          setViewingSupplier({ loading: true, supplier: null, purchases: [], summary: {} });
          setShowViewModal(true);
          
          // Fetch supplier details and purchase history
          Promise.all([
            new Promise((resolve, reject) => {
              google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject)
                .getSupplierById(supplierId);
            }),
            new Promise((resolve, reject) => {
              google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject)
                .getSupplierPurchaseHistory(supplierId);
            })
          ]).then(([supplierResult, historyResult]) => {
            if (supplierResult.success && historyResult.success) {
              setViewingSupplier({
                loading: false,
                supplier: supplierResult.supplier,
                purchases: historyResult.purchases || [],
                summary: historyResult.summary || {}
              });
            } else {
              alert('Error loading supplier data');
              setShowViewModal(false);
            }
          }).catch((error) => {
            alert('Error: ' + error.message);
            setShowViewModal(false);
          });
        };

        window.deleteSupplier = function(supplierId) {
          if (confirm('Delete this supplier?')) {
            google.script.run
              .withSuccessHandler((result) => {
                if (result && result.success) {
                  alert(result.message);
                  loadSuppliers();
                } else {
                  alert('Error: ' + result.message);
                }
              })
              .deleteSupplier(supplierId);
          }
        };

        const handleAddNew = () => {
          setFormData({
            id: '',
            name: '',
            companyName: '',
            contactPerson: '',
            phone: '',
            email: '',
            address: '',
            city: '',
            country: ''
          });
          setEditMode(false);
          setShowModal(true);
        };

        const handleSaveSupplier = () => {
          if (!formData.name) {
            alert('Please enter supplier name');
            return;
          }

          setSaving(true);
          const saveFunction = editMode ? 'updateSupplier' : 'addSupplier';

          google.script.run
            .withSuccessHandler((result) => {
              setSaving(false);
              if (result && result.success) {
                setShowModal(false);
                alert(result.message);
                loadSuppliers();
              } else {
                alert('Error: ' + result.message);
              }
            })
            .withFailureHandler((error) => {
              setSaving(false);
              alert('Error: ' + error.message);
            })
            [saveFunction](formData);
        };

        if (loading) {
          return (
            <div className="container-fluid">
              <div className="text-center p-5">
                <div className="spinner-border text-primary"></div>
                <p>Loading suppliers...</p>
              </div>
            </div>
          );
        }

        return (
          <div className="container-fluid">
            <div className="d-flex justify-content-between align-items-center mb-4">
              <h2><i className="bi bi-truck me-2"></i>Suppliers Management</h2>
              {hasPermission && hasPermission('suppliers', 'add-supplier') && (
              <button className="btn btn-navy" onClick={handleAddNew}>
                <i className="bi bi-plus-circle me-2"></i>Add New Supplier
              </button>
              )}
            </div>

            <div className="card">
              <div className="card-body">
                <table ref={tableRef} className="table table-striped table-hover" style={{width: '100%'}}></table>
              </div>
            </div>

            {showModal && (
              <div className="modal fade show" style={{display: 'block', backgroundColor: 'rgba(0,0,0,0.5)'}} onClick={() => setShowModal(false)}>
                <div className="modal-dialog modal-dialog-centered modal-lg" onClick={(e) => e.stopPropagation()}>
                  <div className="modal-content">
                    <div className="modal-header">
                      <h5 className="modal-title">
                        <i className="bi bi-truck me-2"></i>
                        {editMode ? 'Edit Supplier' : 'Add New Supplier'}
                      </h5>
                      <button type="button" className="btn-close" onClick={() => setShowModal(false)}></button>
                    </div>
                    <div className="modal-body">
                      <div className="row">
                        <div className="col-md-6 mb-3">
                          <label className="form-label">Supplier Name *</label>
                          <input
                            type="text"
                            className="form-control"
                            value={formData.name}
                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                          />
                        </div>
                        <div className="col-md-6 mb-3">
                          <label className="form-label">Company Name</label>
                          <input
                            type="text"
                            className="form-control"
                            value={formData.companyName}
                            onChange={(e) => setFormData({...formData, companyName: e.target.value})}
                          />
                        </div>
                        <div className="col-md-6 mb-3">
                          <label className="form-label">Contact Person</label>
                          <input
                            type="text"
                            className="form-control"
                            value={formData.contactPerson}
                            onChange={(e) => setFormData({...formData, contactPerson: e.target.value})}
                          />
                        </div>
                        <div className="col-md-6 mb-3">
                          <label className="form-label">Phone</label>
                          <input
                            type="tel"
                            className="form-control"
                            value={formData.phone}
                            onChange={(e) => setFormData({...formData, phone: e.target.value})}
                          />
                        </div>
                        <div className="col-md-6 mb-3">
                          <label className="form-label">Email</label>
                          <input
                            type="email"
                            className="form-control"
                            value={formData.email}
                            onChange={(e) => setFormData({...formData, email: e.target.value})}
                          />
                        </div>
                        <div className="col-md-6 mb-3">
                          <label className="form-label">City</label>
                          <input
                            type="text"
                            className="form-control"
                            value={formData.city}
                            onChange={(e) => setFormData({...formData, city: e.target.value})}
                          />
                        </div>
                        <div className="col-md-6 mb-3">
                          <label className="form-label">Country</label>
                          <input
                            type="text"
                            className="form-control"
                            value={formData.country}
                            onChange={(e) => setFormData({...formData, country: e.target.value})}
                          />
                        </div>
                        <div className="col-md-12 mb-3">
                          <label className="form-label">Address</label>
                          <textarea
                            className="form-control"
                            rows="2"
                            value={formData.address}
                            onChange={(e) => setFormData({...formData, address: e.target.value})}
                          ></textarea>
                        </div>
                      </div>
                    </div>
                    <div className="modal-footer">
                      <button type="button" className="btn btn-secondary" onClick={() => setShowModal(false)} disabled={saving}>
                        Cancel
                      </button>
                      <button type="button" className="btn btn-navy" onClick={handleSaveSupplier} disabled={saving}>
                        {saving ? 'Saving...' : (editMode ? 'Update' : 'Add')}
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* View Supplier Modal */}
            {showViewModal && viewingSupplier && (
              <ViewSupplierModal 
                data={viewingSupplier}
                onClose={() => setShowViewModal(false)}
              />
            )}
          </div>
        );
      }

        const dataTableRef = React.useRef(null);
        
        React.useEffect(() => {
          if (!data.loading && data.purchases && data.purchases.length > 0 && tableRef.current) {
            // Destroy existing DataTable if any
            if (dataTableRef.current) {
              try {
                dataTableRef.current.destroy();
              } catch (e) {
                // Ignore
              }
            }
            
            // Initialize DataTable
            setTimeout(() => {
              if (tableRef.current && $.fn.DataTable.isDataTable(tableRef.current)) {
                return;
              }
              
              dataTableRef.current = $(tableRef.current).DataTable({
                data: data.purchases,
                columns: [
                  {
                    data: 'date',
                    title: 'Date',
                    render: (d) => d ? new Date(d).toLocaleDateString() : 'N/A'
                  },
                  { data: 'poNumber', title: 'PO Number' },
                  { data: 'billNum', title: 'Bill #' },
                  { data: 'modelNumber', title: 'Model Number' },
                  { data: 'itemName', title: 'Item Name' },
                  { data: 'category', title: 'Category' },
                  { data: 'location', title: 'Location' },
                  {
                    data: 'qty',
                    title: 'QTY',
                    render: (d) => '<span class="badge bg-primary">' + d + '</span>'
                  }
                ],
                order: [[0, 'desc']], // Sort by date, newest first
                pageLength: 10,
                responsive: true,
                destroy: true
              });
            }, 100);
          }
          
          return () => {
            if (dataTableRef.current) {
              try {
                dataTableRef.current.destroy();
              } catch (e) {
                // Ignore
              }
            }
          };
        }, [data.loading, data.purchases]);
        
        if (data.loading) {
          return (
            <div className="modal fade show" style={{display: 'block', backgroundColor: 'rgba(0,0,0,0.5)'}}>
              <div className="modal-dialog modal-xl modal-dialog-centered">
                <div className="modal-content">
                  <div className="modal-body text-center p-5">
                    <div className="spinner-border text-primary" role="status">
                      <span className="visually-hidden">Loading...</span>
                    </div>
                    <p className="mt-3">Loading supplier data...</p>
                  </div>
                </div>
              </div>
            </div>
          );
        }
        
        const { supplier, purchases, summary } = data;
        
        return (
          <div className="modal fade show" style={{display: 'block', backgroundColor: 'rgba(0,0,0,0.5)', overflowY: 'auto'}} onClick={onClose}>
            <div className="modal-dialog modal-xl" style={{maxWidth: '95%', marginTop: '20px', marginBottom: '20px'}} onClick={(e) => e.stopPropagation()}>
              <div className="modal-content">
                <div className="modal-header" style={{background: '#001f3f', color: 'white'}}>
                  <h5 className="modal-title">
                    <i className="bi bi-eye me-2"></i>
                    View Supplier - {supplier.companyName} ({supplier.id})
                  </h5>
                  <button type="button" className="btn-close btn-close-white" onClick={onClose}></button>
                </div>
                
                <div className="modal-body" style={{padding: '30px'}}>
                  {/* Supplier Information */}
                  <div className="card mb-4">
                    <div className="card-header" style={{background: '#001f3f', color: 'white'}}>
                      <h6 className="mb-0"><i className="bi bi-building me-2"></i>Supplier Information</h6>
                    </div>
                    <div className="card-body">
                      <div className="row">
                        <div className="col-md-3 mb-3">
                          <label className="form-label fw-bold" style={{color: '#666', fontSize: '12px'}}>Supplier ID</label>
                          <div style={{fontSize: '14px', padding: '8px 0', borderBottom: '1px solid #dee2e6'}}>{supplier.id}</div>
                        </div>
                        <div className="col-md-3 mb-3">
                          <label className="form-label fw-bold" style={{color: '#666', fontSize: '12px'}}>Company Name</label>
                          <div style={{fontSize: '14px', padding: '8px 0', borderBottom: '1px solid #dee2e6'}}>{supplier.companyName}</div>
                        </div>
                        <div className="col-md-3 mb-3">
                          <label className="form-label fw-bold" style={{color: '#666', fontSize: '12px'}}>Contact Person</label>
                          <div style={{fontSize: '14px', padding: '8px 0', borderBottom: '1px solid #dee2e6'}}>{supplier.contactPerson || 'N/A'}</div>
                        </div>
                        <div className="col-md-3 mb-3">
                          <label className="form-label fw-bold" style={{color: '#666', fontSize: '12px'}}>Phone</label>
                          <div style={{fontSize: '14px', padding: '8px 0', borderBottom: '1px solid #dee2e6'}}>{supplier.phone || 'N/A'}</div>
                        </div>
                        <div className="col-md-4 mb-3">
                          <label className="form-label fw-bold" style={{color: '#666', fontSize: '12px'}}>Email</label>
                          <div style={{fontSize: '14px', padding: '8px 0', borderBottom: '1px solid #dee2e6'}}>{supplier.email || 'N/A'}</div>
                        </div>
                        <div className="col-md-4 mb-3">
                          <label className="form-label fw-bold" style={{color: '#666', fontSize: '12px'}}>Address</label>
                          <div style={{fontSize: '14px', padding: '8px 0', borderBottom: '1px solid #dee2e6'}}>{supplier.address || 'N/A'}</div>
                        </div>
                        <div className="col-md-2 mb-3">
                          <label className="form-label fw-bold" style={{color: '#666', fontSize: '12px'}}>City</label>
                          <div style={{fontSize: '14px', padding: '8px 0', borderBottom: '1px solid #dee2e6'}}>{supplier.city || 'N/A'}</div>
                        </div>
                        <div className="col-md-2 mb-3">
                          <label className="form-label fw-bold" style={{color: '#666', fontSize: '12px'}}>Country</label>
                          <div style={{fontSize: '14px', padding: '8px 0', borderBottom: '1px solid #dee2e6'}}>{supplier.country || 'N/A'}</div>
                        </div>
                      </div>
                    </div>
                  </div>
                  
                  {/* Purchase Summary */}
                  <div className="card mb-4">
                    <div className="card-header" style={{background: '#001f3f', color: 'white'}}>
                      <h6 className="mb-0"><i className="bi bi-graph-up me-2"></i>Purchase Summary</h6>
                    </div>
                    <div className="card-body">
                      <div className="row text-center">
                        <div className="col-md-2">
                          <div style={{fontSize: '12px', color: '#666', marginBottom: '5px'}}>Total Orders</div>
                          <div style={{fontSize: '24px', fontWeight: 'bold', color: '#001f3f'}}>{summary.totalOrders || 0}</div>
                        </div>
                        <div className="col-md-2">
                          <div style={{fontSize: '12px', color: '#666', marginBottom: '5px'}}>Total Items</div>
                          <div style={{fontSize: '24px', fontWeight: 'bold', color: '#001f3f'}}>{summary.totalItems || 0}</div>
                        </div>
                        <div className="col-md-2">
                          <div style={{fontSize: '12px', color: '#666', marginBottom: '5px'}}>Total Amount</div>
                          <div style={{fontSize: '24px', fontWeight: 'bold', color: '#28a745'}}>${(summary.totalAmount || 0).toFixed(2)}</div>
                        </div>
                        <div className="col-md-3">
                          <div style={{fontSize: '12px', color: '#666', marginBottom: '5px'}}>Most Purchased Item</div>
                          <div style={{fontSize: '14px', fontWeight: 'bold', color: '#001f3f'}}>
                            {summary.mostPurchased?.item || 'N/A'}
                            {summary.mostPurchased?.qty > 0 && <span style={{fontSize: '12px', color: '#666'}}> (×{summary.mostPurchased.qty})</span>}
                          </div>
                        </div>
                        <div className="col-md-3">
                          <div style={{fontSize: '12px', color: '#666', marginBottom: '5px'}}>Date Range</div>
                          <div style={{fontSize: '14px', fontWeight: 'bold', color: '#001f3f'}}>
                            {summary.firstOrder} - {summary.lastOrder}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                  
                  {/* Purchase History Table */}
                  <div className="card">
                    <div className="card-header" style={{background: '#001f3f', color: 'white'}}>
                      <h6 className="mb-0"><i className="bi bi-list-ul me-2"></i>Purchase History ({purchases.length} items)</h6>
                    </div>
                    <div className="card-body">
                      {purchases.length > 0 ? (
                        <table ref={tableRef} className="table table-striped table-hover" style={{width: '100%'}}></table>
                      ) : (
                        <div className="alert alert-info">
                          <i className="bi bi-info-circle me-2"></i>
                          No purchase history found for this supplier.
                        </div>
                      )}
                    </div>
                  </div>
                </div>
                
                <div className="modal-footer">
                  <button type="button" className="btn btn-secondary" onClick={onClose}>
                    <i className="bi bi-x-circle me-2"></i>
                    Close
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ============================================
      // ITEMS VIEW COMPONENT
      // ============================================
      
      function ItemsView({ hasPermission, currentUser }) {
        const [items, setItems] = useState([]);
        const [categories, setCategories] = useState([]);
        const [loading, setLoading] = useState(true);
        const [searchTerm, setSearchTerm] = useState('');
        const [searching, setSearching] = useState(false);
        
        const [showAddItemModal, setShowAddItemModal] = useState(false);
        const [showCategoryModal, setShowCategoryModal] = useState(false);
        const [editMode, setEditMode] = useState(false);
        
        const [itemForm, setItemForm] = useState({
          itemId: '',
          modelNumber: '',
          itemName: '',
          category: '',
          description: '',
          reorderLevel: 0
        });
        
        const [newCategoryName, setNewCategoryName] = useState('');
        const [categorySearchTerm, setCategorySearchTerm] = useState('');
        
        const [saving, setSaving] = useState(false);
        const tableRef = useRef(null);
        const dataTableRef = useRef(null);

        useEffect(() => {
          loadItems();
          loadCategories();
          
          return () => {
            if (dataTableRef.current) {
              try {
                dataTableRef.current.destroy();
              } catch (e) {
                // Ignore cleanup errors
              }
              dataTableRef.current = null;
            }
          };
        }, []);

        const loadItems = (skipLoading = false) => {
          if (!skipLoading) {
            setLoading(true);
          }
          
          google.script.run
            .withSuccessHandler((result) => {
              requestAnimationFrame(() => {
                if (!skipLoading) {
                  setLoading(false);
                }
                
                // Safety check for null/undefined result
                if (result && result.success) {
                  setItems(result.items || []);
                  
                  if (dataTableRef.current) {
                    try {
                      dataTableRef.current.destroy();
                    } catch (e) {
                      // Already destroyed
                    }
                    dataTableRef.current = null;
                  }
                  
                  setTimeout(() => {
                    if (tableRef.current) {
                      initDataTable(result.items || []);
                    }
                  }, 300);
                } else {
                  console.error('❌ Load items failed:', result);
                  console.error('Result object:', JSON.stringify(result));
                  alert('ERROR: ' + JSON.stringify(result));
                  showAlert('error', result ? result.message : 'Failed to load items');
                  setItems([]);
                }
              });
            })
            .withFailureHandler((error) => {
              console.error('Load items error:', error);
              if (!skipLoading) {
                setLoading(false);
              }
              showAlert('error', 'Failed to load items: ' + error.message);
              setItems([]);
            })
            .getAllItems();
        };

        const loadCategories = () => {
          google.script.run
            .withSuccessHandler((result) => {
              if (result.success) {
                setCategories(result.categories);
              }
            })
            .withFailureHandler((error) => {
              console.error('Failed to load categories:', error);
            })
            .getCategories();
        };

        const initDataTable = (data) => {
          if (!tableRef.current) {
            return;
          }

          if (dataTableRef.current) {
            try {
              dataTableRef.current.destroy();
            } catch (e) {
              console.log('DataTable destroy error:', e.message);
            }
            dataTableRef.current = null;
          }

          setTimeout(() => {
            try {
              dataTableRef.current = $(tableRef.current).DataTable({
                data: data,
                deferRender: true,
                processing: true,
                autoWidth: false,
                stateSave: false,
                columns: [
                  { data: 'itemId', title: 'Item ID' },
                  { data: 'modelNumber', title: 'Model Number' },
                  { data: 'itemName', title: 'Item Name' },
                  { data: 'category', title: 'Category' },
                  { 
                    data: 'reorderLevel', 
                    title: 'Reorder Level',
                    render: function(data) {
                      return data || 0;
                    }
                  },
                  { 
                    data: 'reorderRequired', 
                    title: 'Reorder Required',
                    render: function(data) {
                      if (data === 'Yes') {
                        return '<span class="badge bg-danger">Yes</span>';
                      } else {
                        return '<span class="badge bg-success">No</span>';
                      }
                    }
                  },
                  {
                    data: null,
                    title: 'Actions',
                    orderable: false,
                    render: function(data, type, row) {
                      const canEdit = !hasPermission || hasPermission('items', 'edit-item');
                      const canDelete = !hasPermission || hasPermission('items', 'delete-item');
                      
                      let buttons = '';
                      if (canEdit) {
                        buttons += '<button class="btn-action btn-edit" onclick="window.editItem(\'' + row.itemId + '\')" title="Edit Item"><i class="bi bi-pencil-fill"></i></button> ';
                      }
                      if (canDelete) {
                        buttons += '<button class="btn-action btn-delete" onclick="window.deleteItem(\'' + row.itemId + '\')" title="Delete Item"><i class="bi bi-trash-fill"></i></button>';
                      }
                      return buttons;
                    }
                  }
                ],
                responsive: true,
                pageLength: 10,
                order: [[0, 'desc']],
                language: {
                  emptyTable: "No items found"
                },
                destroy: true,
                retrieve: false
              });
            } catch (e) {
              console.error('DataTable initialization error:', e);
            }
          }, 50);
        };

        useEffect(() => {
          window.editItem = (itemId) => {
            requestAnimationFrame(() => {
              google.script.run
                .withSuccessHandler((result) => {
                  if (result.success) {
                    setItemForm({
                      itemId: result.item.itemId,
                      modelNumber: result.item.modelNumber,
                      itemName: result.item.itemName,
                      category: result.item.category,
                      description: result.item.description,
                      reorderLevel: result.item.reorderLevel
                    });
                    setEditMode(true);
                    setTimeout(() => {
                      setShowAddItemModal(true);
                    }, 50);
                  } else {
                    showAlert('error', result.message);
                  }
                })
                .withFailureHandler((error) => {
                  showAlert('error', 'Failed to load item: ' + error.message);
                })
                .getItemById(itemId);
            });
          };

          window.deleteItem = (itemId) => {
            const item = items.find(i => i.itemId === itemId);
            const itemName = item ? item.itemName : 'this item';
            
            Swal.fire({
              title: 'Delete Item?',
              text: 'Are you sure you want to delete "' + itemName + '"? This cannot be undone.',
              icon: 'warning',
              showCancelButton: true,
              confirmButtonColor: '#001f3f',
              cancelButtonColor: '#6c757d',
              confirmButtonText: 'Yes, delete it!',
              allowOutsideClick: false
            }).then((result) => {
              if (result.isConfirmed) {
                google.script.run
                  .withSuccessHandler((result) => {
                    requestAnimationFrame(() => {
                      if (result.success) {
                        Swal.fire({
                          icon: 'success',
                          title: 'Deleted!',
                          text: result.message,
                          confirmButtonColor: '#001f3f',
                          allowOutsideClick: false
                        }).then(() => {
                          loadItems(true);
                        });
                      } else {
                        Swal.fire('Error!', result.message, 'error');
                      }
                    });
                  })
                  .withFailureHandler((error) => {
                    Swal.fire('Error!', 'Failed to delete: ' + error.message, 'error');
                  })
                  .deleteItem(itemId);
              }
            });
          };

          return () => {
            delete window.editItem;
            delete window.deleteItem;
          };
        }, [items]);

        useEffect(() => {
          if (showAddItemModal && categories.length > 0) {
            // Wait longer for modal to fully render
            setTimeout(() => {
              const $select = $('#itemCategory');
              
              if ($select.length) {
                // Destroy if already exists
                if ($select.data('select2')) {
                  $select.select2('destroy');
                }
                
                // Initialize with data
                $select.select2({
                  theme: 'bootstrap-5',
                  placeholder: 'Search or select category...',
                  allowClear: true,
                  width: '100%',
                  dropdownParent: $('.modal-content')  // ← Changed from parent() to modal-content
                }).on('change', function() {
                  const value = $(this).val();
                  setItemForm(prev => ({...prev, category: value}));
                });
              }
            }, 300);  // ← Increased timeout
          }
          
          return () => {
            const $select = $('#itemCategory');
            if ($select.data('select2')) {
              $select.select2('destroy');
            }
          };
        }, [showAddItemModal, categories]);

        const showAlert = (type, message) => {
          const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true
          });

          Toast.fire({
            icon: type,
            title: message
          });
        };

        const handleSearch = () => {
          if (searchTerm.trim() === '') {
            loadItems();
            return;
          }

          setSearching(true);
          
          google.script.run
            .withSuccessHandler((result) => {
              requestAnimationFrame(() => {
                setSearching(false);
                
                if (result.success) {
                  setItems(result.items);
                  
                if (dataTableRef.current) {
                  try {
                    dataTableRef.current.destroy();
                    dataTableRef.current = null;
                  } catch (e) {
                    // Already destroyed
                  }
                }
                setTimeout(() => initDataTable(result.items), 100);
                  
                  showAlert('info', result.items.length + ' item(s) found');
                } else {
                  showAlert('error', result.message);
                }
              });
            })
            .withFailureHandler((error) => {
              requestAnimationFrame(() => {
                setSearching(false);
                showAlert('error', 'Search failed: ' + error.message);
              });
            })
            .searchItems(searchTerm);
        };

          const handleClearSearch = () => {
            setSearchTerm('');
            if (dataTableRef.current) {
              try {
                dataTableRef.current.destroy();
                dataTableRef.current = null;
              } catch (e) {
                // Already destroyed
              }
            }
            loadItems();
          };

        const handleOpenAddModal = () => {
          setItemForm({
            itemId: '',
            modelNumber: '',
            itemName: '',
            category: '',
            description: '',
            reorderLevel: 0
          });
          setEditMode(false);
          
          // Make sure categories are loaded
          if (categories.length === 0) {
            loadCategories();  // ← Add this line if not present
          }
          
          setShowAddItemModal(true);
        };

        const handleSaveItem = () => {
          if (!itemForm.modelNumber || itemForm.modelNumber.trim() === '') {
            showAlert('warning', 'Model Number is required');
            return;
          }
          if (!itemForm.itemName || itemForm.itemName.trim() === '') {
            showAlert('warning', 'Item Name is required');
            return;
          }
          if (!itemForm.category || itemForm.category.trim() === '') {
            showAlert('warning', 'Category is required');
            return;
          }
          if (itemForm.reorderLevel === '' || itemForm.reorderLevel === null || itemForm.reorderLevel === undefined) {
            showAlert('warning', 'Reorder Level is required');
            return;
          }
          
          const reorderLevel = parseFloat(itemForm.reorderLevel);
          if (isNaN(reorderLevel) || reorderLevel < 0) {
            showAlert('warning', 'Reorder Level must be a number >= 0');
            return;
          }

          setSaving(true);
          
          if (editMode) {
            google.script.run
              .withSuccessHandler((result) => {
                requestAnimationFrame(() => {
                  setSaving(false);
                  
                  if (result.success) {
                    setShowAddItemModal(false);
                    
                    setTimeout(() => {
                      Swal.fire({
                        icon: 'success',
                        title: 'Success!',
                        text: result.message,
                        confirmButtonColor: '#001f3f',
                        allowOutsideClick: false
                      }).then(() => {
                        loadItems(true);
                      });
                    }, 200);
                  } else {
                    showAlert('error', result.message);
                  }
                });
              })
              .withFailureHandler((error) => {
                requestAnimationFrame(() => {
                  setSaving(false);
                  showAlert('error', 'Failed to update item: ' + error.message);
                });
              })
              .updateItem(itemForm.itemId, itemForm);
          } else {
            google.script.run
              .withSuccessHandler((result) => {
                requestAnimationFrame(() => {
                  setSaving(false);
                  
                  if (result.success) {
                    setShowAddItemModal(false);
                    
                    setTimeout(() => {
                      Swal.fire({
                        icon: 'success',
                        title: 'Success!',
                        text: result.message,
                        confirmButtonColor: '#001f3f',
                        allowOutsideClick: false
                      }).then(() => {
                        loadItems(true);
                      });
                    }, 200);
                  } else {
                    showAlert('error', result.message);
                  }
                });
              })
              .withFailureHandler((error) => {
                requestAnimationFrame(() => {
                  setSaving(false);
                  showAlert('error', 'Failed to add item: ' + error.message);
                });
              })
              .addItem(itemForm);
          }
        };

        const handleOpenCategoryModal = () => {
          setNewCategoryName('');
          setCategorySearchTerm('');
          setShowCategoryModal(true);
        };

        const handleAddCategory = () => {
          if (!newCategoryName || newCategoryName.trim() === '') {
            showAlert('warning', 'Please enter category name');
            return;
          }

          setSaving(true);
          
          google.script.run
            .withSuccessHandler((result) => {
              requestAnimationFrame(() => {
                setSaving(false);
                
                if (result.success) {
                  showAlert('success', result.message);
                  setNewCategoryName('');
                  
                  setTimeout(() => {
                    loadCategories();
                  }, 200);
                } else {
                  showAlert('error', result.message);
                }
              });
            })
            .withFailureHandler((error) => {
              requestAnimationFrame(() => {
                setSaving(false);
                showAlert('error', 'Failed to add category: ' + error.message);
              });
            })
            .addCategory(newCategoryName.trim());
        };

        const handleDeleteCategory = (categoryId, categoryName) => {
          Swal.fire({
            title: 'Delete Category?',
            text: 'Are you sure you want to delete "' + categoryName + '"?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#001f3f',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, delete it!',
            allowOutsideClick: false
          }).then((result) => {
            if (result.isConfirmed) {
              google.script.run
                .withSuccessHandler((result) => {
                  if (result.success) {
                    showAlert('success', result.message);
                    loadCategories();
                  } else {
                    showAlert('error', result.message);
                  }
                })
                .withFailureHandler((error) => {
                  showAlert('error', 'Failed to delete: ' + error.message);
                })
                .deleteCategory(categoryId);
            }
          });
        };

        const getFilteredCategories = () => {
          if (!categorySearchTerm || categorySearchTerm.trim() === '') {
            return categories;
          }
          const searchLower = categorySearchTerm.toLowerCase();
          return categories.filter(cat => 
            cat.categoryName.toLowerCase().includes(searchLower)
          );
        };

        return (
          <div className="list-view-container">
            <div className="list-view-header">
              <h1 className="list-view-title">
                <i className="bi bi-box-seam me-2"></i>
                Stock Items
              </h1>
              <div style={{display: 'flex', gap: '10px'}}>
                {hasPermission && hasPermission('items', 'add-category') && (
                <button className="btn btn-secondary" onClick={handleOpenCategoryModal}>
                  <i className="bi bi-tag me-2"></i>
                  Add Category
                </button>
                )}
                {hasPermission && hasPermission('items', 'add-item') && (
                <button className="btn btn-navy" onClick={handleOpenAddModal}>
                  <i className="bi bi-plus-circle me-2"></i>
                  Add Stock Item
                </button>
                )}
              </div>
            </div>

            <div className="data-card">
              {loading ? (
                <div className="text-center py-5">
                  <div className="spinner-border text-primary"></div>
                  <p className="mt-3">Loading items...</p>

            const newUser = {
              userID: result.userID,
              username: userData.username,
              email: userData.email,
              fullName: userData.fullName,
              status: userData.status,
              roleID: userData.roleID,
              createdDate: new Date(),
              lastLogin: ''
            };
            
            setUsers(prev => [...prev, newUser]);
            showToast('success', 'User Created Successfully', 'User ID: ' + result.userID);
            
            // Optional: Refresh in background after 2 seconds
            setTimeout(() => {
              google.script.run
                .withSuccessHandler((refreshResult) => {
                  if (refreshResult && refreshResult.success) {
                    setUsers(refreshResult.users || []);
                  }
                })
                .getAllUsers();
            }, 2000);
          } else {
            showToast('error', 'Error', result.message);
            // Reload to get correct state
            loadUsers();
          }
        })
        .withFailureHandler((error) => {
          showToast('error', 'Error', error.message);
          // Reload to get correct state
          loadUsers();
        })
        .addNewUser(userData);
    } else {
      // OPTIMIZED: Update local user object immediately, close modal, then save
      const updatedUser = {
        ...editingUser,
        username: userData.username,
        email: userData.email,
        fullName: userData.fullName,
        status: userData.status,
        roleID: userData.roleID
      };
      
      // Update table instantly
      setUsers(prev => prev.map(u => 
        u.userID === editingUser.userID ? updatedUser : u
      ));
      
      // Close modal immediately
      setShowModal(false);
      setSaving(false);
      showToast('info', 'Updating user...', 'Please wait');
      
      // Save in background
      google.script.run
        .withSuccessHandler((result) => {
          if (result && result.success) {
            showToast('success', 'User Updated Successfully');
            
            // Optional: Refresh in background after 2 seconds to sync permissions
            setTimeout(() => {
              google.script.run
                .withSuccessHandler((refreshResult) => {

                    setUsers(refreshResult.users || []);

                })

          }

          // Reload to get correct state

        })

    }

  const togglePage = (page) => {
    setPageAccess(prev => ({...prev, [page]: !prev[page]}));
  };

    setActionAccess(prev => ({
